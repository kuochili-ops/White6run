<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥白六世界時鐘 - Sprite Engine Pro</title>
    <style>
        :root {
            --gba-color: #8b8b8b;
            --screen-bg: #9bbc0f; 
            --sprite-w: 333px; 
            --sprite-h: 350px; 
        }
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            touch-action: manipulation;
            overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }
        .gba-body {
            width: 320px;
            height: 560px;
            background: var(--gba-color);
            border-radius: 15px 15px 80px 15px;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 15px 15px 30px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .screen-bezel {
            width: 280px;
            height: 200px;
            background: #333;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            border: 4px solid #111;
            position: relative;
            overflow: hidden;
        }
        #game-screen {
            width: 240px;
            height: 160px;
            background: var(--screen-bg);
            position: relative;
        }
        #scrolling-bg {
            position: absolute;
            top: 0;
            left: -40px;
            width: 320px;
            height: 100%;
            background-image: linear-gradient(90deg, rgba(15, 56, 15, 0.1) 1px, transparent 1px);
            background-size: 40px 100%;
        }
        #dog-sprite {
            width: var(--sprite-w);
            height: var(--sprite-h);
            background-image: url('image_8.png'); 
            background-repeat: no-repeat;
            /* 預設靜止圖：下右圖 (2, 1) */
            background-position: -666px -350px; 
            image-rendering: pixelated;
            position: absolute;
            left: 50%;
            margin-left: calc(var(--sprite-w) / -2); 
            bottom: 30px;
            transform: scale(0.2); 
            transform-origin: bottom center;
            transition: bottom 0.15s ease-out;
        }
        .controls { width: 100%; display: flex; justify-content: space-between; padding: 0 10px; }
        .d-pad { display: grid; grid-template-columns: 45px 45px 45px; grid-template-rows: 45px 45px 45px; }
        .btn { background: #333; color: #777; border: none; cursor: pointer; font-size: 18px; display: flex; justify-content: center; align-items: center; }
        .btn:active { transform: translateY(2px); background: #111; }
        .up { grid-column: 2; grid-row: 1; border-radius: 5px 5px 0 0; }
        .left { grid-column: 1; grid-row: 2; border-radius: 5px 0 0 5px; }
        .right { grid-column: 3; grid-row: 2; border-radius: 0 5px 5px 0; }
        .down { grid-column: 2; grid-row: 3; border-radius: 0 0 5px 5px; }
        .action-btns { display: flex; gap: 20px; transform: rotate(-15deg); margin-top: 20px; }
        .round-btn { width: 55px; height: 55px; background: #8e1e3b; border-radius: 50%; box-shadow: 0 5px #5e1327; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="gba-body">
    <div style="font-size: 10px; color: #555; margin-bottom: 5px; font-weight: bold;">DOT MATRIX WITH STEREO SOUND</div>
    <div class="screen-bezel">
        <div id="game-screen">
            <div id="scrolling-bg"></div>
            <div id="dog-sprite"></div>
        </div>
    </div>
    <div class="controls">
        <div class="d-pad">
            <button class="btn up">▲</button>
            <button class="btn left" ontouchstart="setMove('ArrowLeft', true)" onmousedown="setMove('ArrowLeft', true)">◀</button>
            <button class="btn right" ontouchstart="setMove('ArrowRight', true)" onmousedown="setMove('ArrowRight', true)">▶</button>
            <button class="btn down">▼</button>
        </div>
        <div class="action-btns">
            <button class="round-btn" ontouchstart="jump()">A</button>
            <button class="round-btn">B</button>
        </div>
    </div>
</div>

<script>
    const dogSprite = document.getElementById('dog-sprite');
    const scrollingBg = document.getElementById('scrolling-bg');
    
    // image_8.png 規格
    const frameW = 333; 
    const frameH = 350; 
    // 行走動作序列：上左(0), 上中(1), 上右(2), 下左(3), 下中(4)
    const walkSequence = [0, 1, 2, 3, 4];
    const idleFrame = 5; // 下右圖

    let isMoving = false;
    let walkIndex = 0;
    let animInterval = null;
    let bgPos = 0;
    let facing = 1;

    function updateSprite(frameIdx) {
        const col = frameIdx % 3;
        const row = Math.floor(frameIdx / 3);
        dogSprite.style.backgroundPosition = `-${col * frameW}px -${row * frameH}px`;
    }

    function setMove(dir, pressed) {
        if (pressed) {
            isMoving = true;
            facing = (dir === 'ArrowLeft') ? -1 : 1;
            if (!animInterval) startAnimation();
        } else {
            isMoving = false;
            stopAnimation();
        }
    }

    function startAnimation() {
        animInterval = setInterval(() => {
            walkIndex = (walkIndex + 1) % walkSequence.length;
            updateSprite(walkSequence[walkIndex]);
        }, 110);
    }

    function stopAnimation() {
        clearInterval(animInterval);
        animInterval = null;
        walkIndex = 0;
        updateSprite(idleFrame);
    }

    function jump() {
        dogSprite.style.bottom = "85px";
        setTimeout(() => { dogSprite.style.bottom = "30px"; }, 250);
    }

    function loop() {
        if (isMoving) {
            bgPos -= (facing * 3);
            scrollingBg.style.transform = `translateX(${bgPos % 40}px)`;
            dogSprite.style.transform = `scale(0.2) scaleX(${facing})`;
        }
        requestAnimationFrame(loop);
    }

    const clear = () => setMove('', false);
    window.addEventListener('mouseup', clear);
    window.addEventListener('touchend', clear);
    
    loop();
</script>
</body>
</html>

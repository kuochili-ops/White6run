<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥白六傳情 - 打字機版</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&family=Zen+Old+Mincho:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gba-color: #8b8b8b;
            --screen-bg: #9bbc0f; 
            --w: 333px; --h: 350px; 
            --pixel-green: #0f380f;
        }
        body {
            background-color: #1a1a1a;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 10px;
            font-family: sans-serif; touch-action: manipulation; -webkit-user-select: none;
        }
        .gba-body {
            width: 310px; height: 560px;
            background: var(--gba-color); border-radius: 15px 15px 80px 15px;
            display: flex; flex-direction: column; align-items: center;
            padding: 15px; position: relative;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 15px 15px 30px rgba(0,0,0,0.6);
        }
        .screen-area {
            width: 270px; height: 190px;
            background: var(--screen-bg); border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; margin-top: 20px; position: relative;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
        }
        #game-screen { width: 100%; height: 100%; position: relative; overflow: hidden; }
        
        /* 首頁打字機畫面 */
        #home-overlay {
            position: absolute; width: 100%; height: 100%;
            background: var(--screen-bg); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        #typing-text {
            font-size: 16px; font-weight: bold; color: var(--pixel-green);
            min-height: 4.5em; line-height: 1.6; margin-bottom: 10px;
            white-space: pre-wrap;
        }
        @keyframes blink { 50% { opacity: 0; } }
        #start-prompt { font-size: 12px; font-weight: bold; color: #0f380f; animation: blink 1.2s infinite; }

        #msg-display {
            position: absolute; white-space: nowrap; font-size: 150px; font-weight: 900;
            color: rgba(15, 56, 15, 0.15); top: 50%; transform: translateY(-50%);
            left: 270px; pointer-events: none;
        }
        #sprite-container {
            width: var(--w); height: var(--h); position: absolute; left: 50%; bottom: 0px;
            margin-left: calc(var(--w) / -2); transform: scale(0.2); transform-origin: bottom center;
            overflow: hidden; z-index: 10;
        }
        #dog-sprite {
            width: 100%; height: 100%; background-image: url('image_8.png');
            background-repeat: no-repeat; background-size: 999px 700px;
            background-position: -666px -335px; image-rendering: pixelated;
        }

        /* 控制器樣式 */
        .controls { width: 100%; display: flex; justify-content: space-between; margin-top: 35px; padding: 0 10px; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 40px); grid-template-rows: repeat(3, 40px); }
        .btn { background: #333; border: none; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; }
        .left { grid-column: 1; grid-row: 2; border-radius: 6px 0 0 6px; }
        .right { grid-column: 3; grid-row: 2; border-radius: 0 6px 6px 0; }
        .action-btns { display: flex; gap: 15px; transform: rotate(-15deg); margin-top: 15px; }
        .round-btn { width: 50px; height: 50px; background: #8e1e3b; border-radius: 50%; box-shadow: 0 4px 0 #000; font-weight: bold; }
        .system-btns { display: flex; gap: 20px; margin-top: 45px; transform: rotate(-15deg); }
        .pill-btn { width: 45px; height: 12px; background: #555; border-radius: 10px; box-shadow: 0 3px #222; }
        .sys-label { font-size: 9px; font-weight: bold; color: #333; margin-top: 6px; text-align: center; }
    </style>
</head>
<body>

<div class="gba-body">
    <div class="screen-area">
        <!-- 首頁畫面 -->
        <div id="home-overlay">
            <div id="typing-text"></div>
            <div id="start-prompt" style="visibility: hidden;">PRESS START</div>
        </div>
        
        <!-- 遊戲畫面 -->
        <div id="game-screen">
            <div id="msg-display">白六與你同行</div>
            <div id="sprite-container">
                <div id="dog-sprite"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="d-pad">
            <button class="btn left" ontouchstart="handleInput('L', true)" onmousedown="handleInput('L', true)">◀</button>
            <button class="btn right" ontouchstart="handleInput('R', true)" onmousedown="handleInput('R', true)">▶</button>
        </div>
        <div class="action-btns">
            <button class="btn round-btn" onclick="handleInput('A', true)">A</button>
            <button class="btn round-btn">B</button>
        </div>
    </div>

    <div class="system-btns">
        <div class="sys-group" onclick="goHome()">
            <div class="pill-btn"></div>
            <div class="sys-label">SELECT</div>
        </div>
        <div class="sys-group" onclick="startGame()">
            <div class="pill-btn"></div>
            <div class="sys-label">START</div>
        </div>
    </div>
</div>

<!-- 音訊資源 -->
<audio id="bg-music" loop preload="auto">
    <source src="https://kuochili-ops.github.io/White6run/morning_sprite_walk.mp3" type="audio/mpeg">
</audio>

<script>
    const dog = document.getElementById('dog-sprite');
    const container = document.getElementById('sprite-container');
    const msgDisplay = document.getElementById('msg-display');
    const bgMusic = document.getElementById('bg-music');
    const homeOverlay = document.getElementById('home-overlay');
    const typingText = document.getElementById('typing-text');
    const startPrompt = document.getElementById('start-prompt');

    const walkSequence = [[0, 0, 130], [1, 0, 90], [2, 0, 130], [0, 1, 90], [1, 1, 130]];
    const idleFrame = [2, 1];
    const Y_OFFSET = -335;

    let isMoving = false, currentFrameIdx = 0, animTimeout = null, textPos = 270;
    let currentDir = 'R', autoWalkTimer = null;

    // 打字機效果
    function typeMessage() {
        const fullMsg = "你好，親友們❤️\n白六今天想跟你分享一段話...";
        typingText.innerText = "";
        startPrompt.style.visibility = "hidden";
        let i = 0;
        const timer = setInterval(() => {
            typingText.innerText += fullMsg[i];
            i++;
            if (i >= fullMsg.length) {
                clearInterval(timer);
                startPrompt.style.visibility = "visible";
            }
        }, 100);
    }

    function startGame() {
        homeOverlay.style.display = "none";
        bgMusic.play().catch(() => {}); // 啟動音樂
        resetAutoWalk();
    }

    function goHome() {
        homeOverlay.style.display = "flex";
        bgMusic.pause();
        stopMoving();
        clearTimeout(autoWalkTimer);
        typeMessage();
    }

    function handleInput(type, pressed) {
        if (homeOverlay.style.display !== "none") {
            if (type === 'A' || type === 'L' || type === 'R') startGame();
            return;
        }
        if (type === 'A') jump();
        else move(type, pressed);
    }

    function move(dir, pressed) {
        if (pressed) {
            clearTimeout(autoWalkTimer);
            if (isMoving && currentDir === dir) return;
            stopMoving();
            currentDir = dir;
            isMoving = true;
            container.style.transform = `scale(0.2) scaleX(${dir === 'L' ? -1 : 1})`;
            animate();
        } else {
            stopMoving();
            resetAutoWalk();
        }
    }

    function animate() {
        if (!isMoving) return;
        const frame = walkSequence[currentFrameIdx];
        dog.style.backgroundPosition = `-${frame[0] * 333}px ${Y_OFFSET}px`;
        textPos += (currentDir === 'R' ? -12 : 12);
        if (textPos < -msgDisplay.offsetWidth) textPos = 270;
        if (textPos > 270) textPos = -msgDisplay.offsetWidth;
        msgDisplay.style.left = textPos + "px";
        currentFrameIdx = (currentFrameIdx + 1) % walkSequence.length;
        animTimeout = setTimeout(animate, frame[2]);
    }

    function stopMoving() {
        isMoving = false;
        clearTimeout(animTimeout);
        dog.style.backgroundPosition = `-${idleFrame[0] * 333}px ${Y_OFFSET}px`;
        currentFrameIdx = 0;
    }

    function resetAutoWalk() {
        clearTimeout(autoWalkTimer);
        autoWalkTimer = setTimeout(() => {
            if (homeOverlay.style.display === "none") move('R', true);
        }, 1000);
    }

    function jump() {
        container.style.transition = "bottom 0.2s";
        container.style.bottom = "60px";
        setTimeout(() => container.style.bottom = "0px", 200);
        resetAutoWalk();
    }

    // 初始化
    typeMessage();
    window.addEventListener('mouseup', () => move('', false));
    window.addEventListener('touchend', () => move('', false));
</script>
</body>
</html>

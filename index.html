<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>White 6 GBA - Stationary Walk</title>
    <style>
        :root {
            --gba-color: #8b8b8b;
            --screen-bg: #9bbc0f; /* 經典 GB 螢幕色 */
            /* 精靈圖單幀解析度 (依據 3x2 網格) */
            --sprite-w: 333px; 
            --sprite-h: 350px; 
        }
        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            touch-action: manipulation;
            overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }
        /* GBA 機體 */
        .gba-body {
            width: 320px;
            height: 540px;
            background: var(--gba-color);
            border-radius: 15px 15px 70px 15px;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 15px 15px 30px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        /* 螢幕 */
        .screen-bezel {
            width: 280px;
            height: 200px;
            background: #333;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }
        #game-screen {
            width: 240px;
            height: 160px;
            background: var(--screen-bg);
            position: relative;
            border: 2px solid #000;
        }
        
        /* ⚠️ 關鍵修正 1：背景傳送帶 */
        #scrolling-background {
            position: absolute;
            width: 200%; /* 比螢幕寬，用於滾動 */
            height: 100%;
            background-image: 
                linear-gradient(#0f380f 1px, transparent 1px), /* 網格地平線 */
                linear-gradient(90deg, #0f380f 1px, transparent 1px);
            background-size: 20px 20px; /* 網格大小 */
            background-position: 0px 130px; /* 地平線高度 */
            background-repeat: repeat-x;
            opacity: 0.3;
            left: 0;
            top: 0;
        }

        /* ⚠️ 關鍵修正 2：白六精靈圖元件 (固定位置) */
        #dog-sprite {
            width: var(--sprite-w);
            height: var(--sprite-h);
            background-image: url('image_8.PNG'); /* ⚠️ 確保副檔名與 GitHub 一致 */
            background-repeat: no-repeat;
            background-position: 0px 0px;
            image-rendering: pixelated;
            position: absolute;
            
            /* **🔒 鎖定在畫面中間** */
            left: 50%;
            bottom: 30px; /* 站在地平線上 */
            
            /* 將巨大的原始圖縮小，並處理轉向 */
            transform: scale(0.18) translate(-50%, 0); 
            transform-origin: bottom left; /* 修正縮放基準點 */
            
            transition: transform 0.1s linear;
            z-index: 10;
        }

        /* 控制按鈕樣式與之前相同 */
        .controls { width: 100%; display: flex; justify-content: space-between; padding: 0 10px; margin-top: 20px; }
        .d-pad { display: grid; grid-template-columns: 45px 45px 45px; grid-template-rows: 45px 45px 45px; }
        .btn { background: #222; color: #555; border: none; box-shadow: 0 4px #000; display: flex; justify-content: center; align-items: center; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; background: #111; }
        .up { grid-column: 2; grid-row: 1; border-radius: 5px 5px 0 0; }
        .left { grid-column: 1; grid-row: 2; border-radius: 5px 0 0 5px; }
        .right { grid-column: 3; grid-row: 2; border-radius: 0 5px 5px 0; }
        .down { grid-column: 2; grid-row: 3; border-radius: 0 0 5px 5px; }
        .action-btns { display: flex; gap: 15px; transform: rotate(-15deg); }
        .round-btn { width: 55px; height: 55px; background: #8e1e3b; border-radius: 50%; box-shadow: 0 5px #5e1327; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="gba-body">
    <div style="font-size: 10px; color: #555; margin-bottom: 5px; font-weight: bold;">DOT MATRIX WITH STEREO SOUND</div>
    <div class="screen-bezel">
        <div id="game-screen">
            <div id="scrolling-background"></div>
            <div id="dog-sprite"></div>
        </div>
    </div>

    <div class="controls">
        <div class="d-pad">
            <button class="btn up" onmousedown="setKey('ArrowUp', true)" onmouseup="setKey('ArrowUp', false)" ontouchstart="setKey('ArrowUp', true)">▲</button>
            <button class="btn left" onmousedown="setKey('ArrowLeft', true)" onmouseup="setKey('ArrowLeft', false)" ontouchstart="setKey('ArrowLeft', true)">◀</button>
            <button class="btn right" onmousedown="setKey('ArrowRight', true)" onmouseup="setKey('ArrowRight', false)" ontouchstart="setKey('ArrowRight', true)">▶</button>
            <button class="btn down" onmousedown="setKey('ArrowDown', true)" onmouseup="setKey('ArrowDown', false)" ontouchstart="setKey('ArrowDown', true)">▼</button>
        </div>
        <div class="action-btns">
            <button class="btn round-btn" onmousedown="setKey('KeyX', true)" onmouseup="setKey('KeyX', false)" ontouchstart="setKey('KeyX', true)">B</button>
            <button class="btn round-btn" onmousedown="setKey('KeyZ', true)" onmouseup="setKey('KeyZ', false)" ontouchstart="setKey('KeyZ', true)">A</button>
        </div>
    </div>
</div>

<script>
    const dogSprite = document.getElementById('dog-sprite');
    const bg = document.getElementById('scrolling-background');
    const frameW = 333; 
    const frameH = 350; 
    
    let keys = {};
    let isMoving = false;
    let currentFrame = 0;
    let animTimer = null;
    let bgOffset = 0; // 背景偏移量
    let facing = 1;

    function setKey(code, isPressed) {
        keys[code] = isPressed;
        if ((keys['ArrowLeft'] || keys['ArrowRight']) && !isMoving) {
            isMoving = true;
            startAnim();
        } else if (!keys['ArrowLeft'] && !keys['ArrowRight']) {
            isMoving = false;
            stopAnim();
        }
    }

    // 動畫幀切換邏輯 (與之前相同，讓腳動起來)
    function startAnim() {
        animTimer = setInterval(() => {
            currentFrame = (currentFrame + 1) % 6;
            const col = currentFrame % 3;
            const row = Math.floor(currentFrame / 3);
            dogSprite.style.backgroundPosition = `-${col * frameW}px -${row * frameH}px`;
        }, 120);
    }

    function stopAnim() {
        clearInterval(animTimer);
        currentFrame = 0;
        dogSprite.style.backgroundPosition = "0px 0px"; // 閒置幀
    }

    // ⚠️ 關鍵修正 4：遊戲循環 (移動背景而非白六)
    function gameLoop() {
        let speed = keys['KeyX'] ? 4 : 2; // B鍵加速背景

        if (keys['ArrowRight']) {
            // 向右走 -> 背景向左捲動
            bgOffset -= speed;
            facing = 1;
        } else if (keys['ArrowLeft']) {
            // 向左走 -> 背景向右捲動
            bgOffset += speed;
            facing = -1;
        }
        
        // 確保背景偏移量無限循環
        bgOffset = bgOffset % 240; 
        
        // 更新背景位置
        bg.style.transform = `translateX(${bgOffset}px)`;
        
        // 🔒 更新白六朝向 (保持 scale 縮放)
        dogSprite.style.transform = `scale(0.18) translate(-50%, 0) scaleX(${facing})`;
        
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', e => setKey(e.code, true));
    window.addEventListener('keyup', e => setKey(e.code, false));
    window.addEventListener('mouseup', () => { keys = {}; stopAnim(); isMoving = false; });
    window.addEventListener('touchend', () => { keys = {}; stopAnim(); isMoving = false; });

    gameLoop();
</script>
</body>
</html>

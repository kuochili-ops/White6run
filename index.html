<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥白六世界時鐘 - Walk Engine</title>
    <style>
        :root {
            --gba-color: #8b8b8b;
            --screen-bg: #9bbc0f; /* 經典 GB 綠 */
            /* 修正後的單幀精靈圖比例 (333x350) */
            --sprite-w: 333px; 
            --sprite-h: 350px; 
        }
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            touch-action: manipulation;
            overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }
        /* GBA 機體 */
        .gba-body {
            width: 320px;
            height: 560px;
            background: var(--gba-color);
            border-radius: 15px 15px 80px 15px;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 15px 15px 30px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        /* 螢幕外框 */
        .screen-bezel {
            width: 280px;
            height: 200px;
            background: #333;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            border: 4px solid #222;
            position: relative;
            overflow: hidden;
        }
        #game-screen {
            width: 240px;
            height: 160px;
            background: var(--screen-bg);
            position: relative;
        }
        /* 地平線 */
        .ground {
            position: absolute;
            bottom: 30px;
            width: 100%;
            height: 2px;
            background: #0f380f;
            opacity: 0.5;
        }
        /* 白六精靈圖元件 */
        #dog-sprite {
            width: var(--sprite-w);
            height: var(--sprite-h);
            background-image: url('image_8.PNG'); /* 確保與 GitHub 上的檔名一致 */
            background-repeat: no-repeat;
            background-position: 0px 0px;
            image-rendering: pixelated;
            position: absolute;
            /* 縮放巨大的原始圖至螢幕大小 (0.18倍) */
            transform: scale(0.18); 
            transform-origin: bottom center;
            bottom: 30px; 
            left: 50%;
            transition: transform 0.1s linear;
        }
        /* 控制介面 */
        .controls {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }
        .d-pad {
            display: grid;
            grid-template-columns: 45px 45px 45px;
            grid-template-rows: 45px 45px 45px;
        }
        .btn {
            background: #333;
            color: #777;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; background: #111; }
        .up    { grid-column: 2; grid-row: 1; border-radius: 5px 5px 0 0; }
        .left  { grid-column: 1; grid-row: 2; border-radius: 5px 0 0 5px; }
        .right { grid-column: 3; grid-row: 2; border-radius: 0 5px 5px 0; }
        .down  { grid-column: 2; grid-row: 3; border-radius: 0 0 5px 5px; }

        .action-btns {
            display: flex;
            gap: 20px;
            transform: rotate(-15deg);
        }
        .round-btn {
            width: 55px;
            height: 55px;
            background: #8e1e3b;
            border-radius: 50%;
            box-shadow: 0 5px #5e1327;
            color: #ff99aa;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .round-btn:active { transform: translateY(2px); box-shadow: 0 2px #5e1327; }
    </style>
</head>
<body>

<div class="gba-body">
    <div style="font-size: 10px; color: #555; margin-bottom: 5px; font-weight: bold;">DOT MATRIX WITH STEREO SOUND</div>
    <div class="screen-bezel">
        <div id="game-screen">
            <div class="ground"></div>
            <div id="dog-sprite"></div>
        </div>
    </div>

    <div class="controls">
        <div class="d-pad">
            <button class="btn up" onmousedown="setKey('ArrowUp', true)" onmouseup="setKey('ArrowUp', false)" ontouchstart="setKey('ArrowUp', true)">▲</button>
            <button class="btn left" onmousedown="setKey('ArrowLeft', true)" onmouseup="setKey('ArrowLeft', false)" ontouchstart="setKey('ArrowLeft', true)">◀</button>
            <button class="btn right" onmousedown="setKey('ArrowRight', true)" onmouseup="setKey('ArrowRight', false)" ontouchstart="setKey('ArrowRight', true)">▶</button>
            <button class="btn down" onmousedown="setKey('ArrowDown', true)" onmouseup="setKey('ArrowDown', false)" ontouchstart="setKey('ArrowDown', true)">▼</button>
        </div>

        <div class="action-btns">
            <button class="btn round-btn" onmousedown="setKey('KeyX', true)" onmouseup="setKey('KeyX', false)" ontouchstart="setKey('KeyX', true)">B</button>
            <button class="btn round-btn" onmousedown="setKey('KeyZ', true)" onmouseup="setKey('KeyZ', false)" ontouchstart="setKey('KeyZ', true)">A</button>
        </div>
    </div>
    <div style="margin-top: 40px; color: #555; font-weight: bold; letter-spacing: 2px;">Nintendo GAME BOY</div>
</div>

<script>
    const dogSprite = document.getElementById('dog-sprite');
    
    // 精靈貼圖參數 (對應 3 欄 2 列)
    const frameW = 333; 
    const frameH = 350; 
    const cols = 3;
    const totalFrames = 6;

    // 遊戲狀態
    let keys = {};
    let isMoving = false;
    let currentFrame = 0;
    let animInterval = null;
    let posX = 120;
    let facing = 1; // 1 為右, -1 為左

    function setKey(code, isPressed) {
        keys[code] = isPressed;
        const moveKeyPressed = keys['ArrowLeft'] || keys['ArrowRight'];
        
        if (moveKeyPressed && !isMoving) {
            isMoving = true;
            startAnimation();
        } else if (!moveKeyPressed && isMoving) {
            isMoving = false;
            stopAnimation();
        }
    }

    // 動畫切換
    function startAnimation() {
        animInterval = setInterval(() => {
            currentFrame = (currentFrame + 1) % totalFrames;
            const col = currentFrame % cols;
            const row = Math.floor(currentFrame / cols);
            
            // 更新背景偏移位置
            dogSprite.style.backgroundPosition = `-${col * frameW}px -${row * frameH}px`;
        }, 120);
    }

    function stopAnimation() {
        clearInterval(animInterval);
        currentFrame = 0;
        dogSprite.style.backgroundPosition = "0px 0px"; // 回到初始幀
    }

    // 移動與渲染循環
    function update() {
        let speed = keys['KeyX'] ? 3 : 1.5; // 按住B鍵加速

        if (keys['ArrowRight']) {
            posX += speed;
            facing = 1;
        } else if (keys['ArrowLeft']) {
            posX -= speed;
            facing = -1;
        }

        // 螢幕邊界限制
        posX = Math.max(20, Math.min(220, posX));

        // 更新實際位置與朝向
        dogSprite.style.left = `calc(${posX}px - ${frameW/2}px)`;
        dogSprite.style.transform = `scale(0.18) scaleX(${facing})`;

        requestAnimationFrame(update);
    }

    // 鍵盤支援
    window.addEventListener('keydown', e => setKey(e.code, true));
    window.addEventListener('keyup', e => setKey(e.code, false));
    window.addEventListener('mouseup', () => { keys = {}; stopAnimation(); isMoving = false; });

    update();
</script>
</body>
</html>

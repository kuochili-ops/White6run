<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥白六靜止圖測試</title>
    <style>
        :root {
            --gba-color: #8b8b8b;
            --screen-bg: #9bbc0f; 
            /* ⚠️ 單幀精確尺寸 */
            --sprite-w: 333px; 
            --sprite-h: 350px; 
        }
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-user-select: none;
        }
        .gba-body {
            width: 320px;
            height: 560px;
            background: var(--gba-color);
            border-radius: 15px 15px 80px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .screen-bezel {
            width: 280px;
            height: 200px;
            background: #333;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #111;
            overflow: hidden;
        }
        #game-screen {
            width: 240px;
            height: 160px;
            background: var(--screen-bg);
            position: relative;
        }
        /* 🔍 靜止圖測試元件 */
        #dog-sprite {
            width: var(--sprite-w);
            height: var(--sprite-h);
            background-image: url('image_8.png'); 
            background-repeat: no-repeat;
            
            /* 🎯 關鍵：定位到「下右圖」 */
            /* 下排 = 偏移一倍高度 (-350px) */
            /* 右圖 = 偏移兩倍寬度 (-666px) */
            background-position: -666px -350px; 
            
            image-rendering: pixelated;
            position: absolute;
            left: 50%;
            margin-left: calc(var(--sprite-w) / -2); 
            bottom: 30px;
            
            /* 縮放至螢幕適當大小 */
            transform: scale(0.2); 
            transform-origin: bottom center;
        }
    </style>
</head>
<body>

<div class="gba-body">
    <div style="font-size: 10px; color: #555; margin-bottom: 5px; font-weight: bold;">STILL IMAGE TEST</div>
    <div class="screen-bezel">
        <div id="game-screen">
            <div id="dog-sprite"></div>
        </div>
    </div>
    <div style="margin-top: 40px; color: #333; font-weight: bold;">請確認是否為「下右圖」</div>
</div>

</body>
</html>

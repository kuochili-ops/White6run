<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥白六 GBA 模擬器 - Walk Engine Fixed</title>
    <style>
        :root {
            --gba-color: #8b8b8b;
            --screen-bg: #9bbc0f; /* 經典 GB 綠 */
            /* **⚠️ 核心修正 1：設定正確的單幀網格尺寸** */
            --sprite-w: 333px; /* 單幀狗狗的寬度 */
            --sprite-h: 350px; /* 單幀狗狗的高度 */
        }
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            touch-action: manipulation;
            overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }
        .gba-body {
            width: 320px;
            height: 560px;
            background: var(--gba-color);
            border-radius: 15px 15px 80px 15px;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 15px 15px 30px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .screen-bezel {
            width: 280px;
            height: 200px;
            background: #333;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            border: 4px solid #111;
            position: relative;
            overflow: hidden;
        }
        #game-screen {
            width: 240px;
            height: 160px;
            background: var(--screen-bg);
            position: relative;
        }
        .ground {
            position: absolute;
            bottom: 30px;
            width: 100%;
            height: 2px;
            background: #0f380f;
            opacity: 0.5;
        }
        /* **⚠️ 核心修正 2：精靈圖定位與縮放** */
        #dog-sprite {
            width: var(--sprite-w);
            height: var(--sprite-h);
            background-image: url('image_8.PNG'); /* 確保檔名大小寫一致 */
            background-repeat: no-repeat;
            background-position: 0px 0px;
            image-rendering: pixelated;
            position: absolute;
            
            /* **🔒 修正置中邏輯：left 50% 配合 margin-left 負值** */
            left: 50%;
            margin-left: calc(var(--sprite-w) / -2); 
            
            /* **⚠️ 用 CSS 縮放巨大的原始圖至螢幕大小 (0.18倍)** */
            transform: scale(0.18); 
            transform-origin: bottom center;
            bottom: 30px; /* 站在地平線上的高度 */
            
            transition: transform 0.1s linear;
        }
        /* 按鈕樣式與之前相同 */
        .controls { width: 100%; display: flex; justify-content: space-between; padding: 0 10px; }
        .d-pad { display: grid; grid-template-columns: 45px 45px 45px; grid-template-rows: 45px 45px 45px; }
        .btn { background: #333; color: #777; border: none; cursor: pointer; font-size: 18px; display: flex; justify-content: center; align-items: center; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; background: #111; }
        .up { grid-column: 2; grid-row: 1; border-radius: 5px 5px 0 0; }
        .left { grid-column: 1; grid-row: 2; border-radius: 5px 0 0 5px; }
        .right { grid-column: 3; grid-row: 2; border-radius: 0 5px 5px 0; }
        .down { grid-column: 2; grid-row: 3; border-radius: 0 0 5px 5px; }
        .action-btns { display: flex; gap: 20px; transform: rotate(-15deg); margin-top: 20px; }
        .round-btn { width: 55px; height: 55px; background: #8e1e3b; border-radius: 50%; box-shadow: 0 5px #5e1327; color: rgba(255,255,255,0.4); font-weight: bold; }
    </style>
</head>
<body>

<div class="gba-body">
    <div style="font-size: 10px; color: #555; margin-bottom: 5px; font-weight: bold;">DOT MATRIX WITH STEREO SOUND</div>
    <div class="screen-bezel">
        <div id="game-screen">
            <div class="ground"></div>
            <div id="dog-sprite"></div>
        </div>
    </div>
    <div class="controls">
        <div class="d-pad">
            <button class="btn up">▲</button>
            <button class="btn left" ontouchstart="setKey('ArrowLeft', true)" onmousedown="setKey('ArrowLeft', true)">◀</button>
            <button class="btn right" ontouchstart="setKey('ArrowRight', true)" onmousedown="setKey('ArrowRight', true)">▶</button>
            <button class="btn down">▼</button>
        </div>
        <div class="action-btns">
            <button class="round-btn" ontouchstart="setKey('KeyX', true)" onmousedown="setKey('KeyX', true)">B</button>
            <button class="round-btn" ontouchstart="jump()">A</button>
        </div>
    </div>
</div>

<script>
    const dogSprite = document.getElementById('dog-sprite');
    
    // **⚠️ 精靈貼圖參數修正 (對應 3x2 貼圖)**
    const frameW = 333; // ⚠️ 修改為正確像素寬度
    const frameH = 350; // ⚠️ 修改為正確像素高度
    const cols = 3; // 貼圖欄數
    const totalFrames = 6; // 總幀數 (3欄x2列)

    // 遊戲狀態
    let keys = {};
    let isMoving = false;
    let currentFrame = 0;
    let animInterval = null;
    let posX = 120; // 初始螢幕位置
    let facing = 1; // 1 為右, -1 為左 (水平鏡像)
    let isJumping = false;

    function setKey(code, isPressed) {
        keys[code] = isPressed;
        const moveKeyPressed = keys['ArrowLeft'] || keys['ArrowRight'];
        
        if (moveKeyPressed && !isMoving) {
            isMoving = true;
            startAnimation();
        } else if (!moveKeyPressed && isMoving) {
            isMoving = false;
            stopAnimation();
        }
    }

    // A 鍵跳躍
    function jump() {
        if (isJumping) return;
        isJumping = true;
        dogSprite.style.bottom = "80px";
        setTimeout(() => {
            dogSprite.style.bottom = "30px";
            setTimeout(() => { isJumping = false; }, 100);
        }, 300);
    }

    // --- **⚠️ 核心動畫幀切換邏輯 (滾動 3x2 網格)** ---
    function startAnimation() {
        if (animInterval) clearInterval(animInterval); // 防止計時器堆疊
        animInterval = setInterval(() => {
            currentFrame = (currentFrame + 1) % totalFrames;
            const col = currentFrame % cols;
            const row = Math.floor(currentFrame / cols);
            
            // 計算負值偏移量：將圖片向左/上捲動
            dogSprite.style.backgroundPosition = `-${col * frameW}px -${row * frameH}px`;
        }, 120); // 每 0.12 秒切換一幀
    }

    function stopAnimation() {
        clearInterval(animInterval);
        currentFrame = 0;
        dogSprite.style.backgroundPosition = "0px 0px"; // 回到第一幀
    }

    // 遊戲循環 (處理移動)
    function loop() {
        let speed = keys['KeyX'] ? 3 : 1.5; // 按住B鍵加速

        if (keys['ArrowRight']) {
            posX += speed;
            facing = 1;
        } else if (keys['ArrowLeft']) {
            posX -= speed;
            facing = -1;
        }

        // 螢幕邊界限制
        posX = Math.max(20, Math.min(220, posX));

        // 更新朝向 (scale + scaleX) 與置中位置
        // **⚠️ 鎖定在中間原地踏步 (只處理facing和scale)**
        dogSprite.style.transform = `scale(0.18) scaleX(${facing})`;

        requestAnimationFrame(loop);
    }

    // 防止觸控卡死的全域監聽
    const releaseKeys = () => { keys = {}; stopAnimation(); isMoving = false; };
    window.addEventListener('touchend', releaseKeys);
    window.addEventListener('mouseup', releaseKeys);
    window.addEventListener('keydown', e => setKey(e.code, true));
    window.addEventListener('keyup', e => setKey(e.code, false));

    loop();
</script>
</body>
</html>

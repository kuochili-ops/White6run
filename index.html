<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥白六傳情 - 律動優化版</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&family=Zen+Old+Mincho:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gba-color: #8b8b8b;
            --screen-bg: #9bbc0f; 
            --w: 333px; --h: 350px; 
            --pixel-green: #0f380f;
        }
        body {
            background-color: #1a1a1a;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 10px;
            font-family: sans-serif; touch-action: manipulation; -webkit-user-select: none;
        }
        .gba-body {
            width: 310px; height: 560px;
            background: var(--gba-color); border-radius: 15px 15px 80px 15px;
            display: flex; flex-direction: column; align-items: center;
            padding: 15px; position: relative;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 15px 15px 30px rgba(0,0,0,0.6);
        }
        .screen-area {
            width: 270px; height: 190px;
            background: var(--screen-bg); border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; margin-top: 20px; position: relative;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
        }
        #game-screen { width: 100%; height: 100%; position: relative; overflow: hidden; }
        #msg-display {
            position: absolute; white-space: nowrap; font-size: 150px; font-weight: 900;
            color: rgba(15, 56, 15, 0.15); top: 50%; transform: translateY(-50%);
            left: 270px; pointer-events: none; line-height: 1;
        }
        #sprite-container {
            width: var(--w); height: var(--h); position: absolute; left: 50%; bottom: 0px;
            margin-left: calc(var(--w) / -2); transform: scale(0.2); transform-origin: bottom center;
            overflow: hidden; z-index: 10;
        }
        #dog-sprite {
            width: 100%; height: 100%; background-image: url('image_8.png');
            background-repeat: no-repeat; background-size: 999px 700px;
            background-position: -666px -330px;
            image-rendering: pixelated;
        }
        .controls { width: 100%; display: flex; justify-content: space-between; margin-top: 35px; padding: 0 10px; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 40px); grid-template-rows: repeat(3, 40px); filter: drop-shadow(0 4px 0 #000); }
        .btn { background: #333; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .up { grid-column: 2; grid-row: 1; border-radius: 6px 6px 0 0; color: #fff; font-size: 10px; }
        .left { grid-column: 1; grid-row: 2; border-radius: 6px 0 0 6px; color: #fff; }
        .right { grid-column: 3; grid-row: 2; border-radius: 0 6px 6px 0; color: #fff; }
        .down { grid-column: 2; grid-row: 3; border-radius: 0 0 6px 6px; color: #fff; font-size: 10px; }
        .action-btns { display: flex; gap: 15px; transform: rotate(-15deg); margin-top: 15px; }
        .round-btn { width: 50px; height: 50px; background: #8e1e3b; border-radius: 50%; box-shadow: 0 4px 0 #000; color: rgba(255,255,255,0.4); font-weight: bold; font-size: 14px; }
        .system-btns { display: flex; gap: 20px; margin-top: 45px; transform: rotate(-15deg); }
        .sys-group { text-align: center; cursor: pointer; }
        .pill-btn { width: 45px; height: 12px; background: #555; border-radius: 10px; box-shadow: 0 3px #222; }
        .sys-label { font-size: 9px; font-weight: bold; color: #333; margin-top: 6px; }
    </style>
</head>
<body>

<div class="gba-body">
    <div class="screen-area">
        <div id="game-screen">
            <div id="msg-display">白六與你同行</div>
            <div id="sprite-container">
                <div id="dog-sprite"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="d-pad">
            <button class="btn up">F</button>
            <button class="btn left" ontouchstart="move('L', true)" onmousedown="move('L', true)">◀</button>
            <button class="btn right" ontouchstart="move('R', true)" onmousedown="move('R', true)">▶</button>
            <button class="btn down">C</button>
        </div>
        <div class="action-btns">
            <button class="btn round-btn">A</button>
            <button class="btn round-btn">B</button>
        </div>
    </div>

    <div class="system-btns">
        <div class="sys-group"><div class="pill-btn"></div><div class="sys-label">SELECT</div></div>
        <div class="sys-group"><div class="pill-btn"></div><div class="sys-label">START</div></div>
    </div>
</div>

<script>
    const dog = document.getElementById('dog-sprite');
    const container = document.getElementById('sprite-container');
    const msgDisplay = document.getElementById('msg-display');

    // 優化後的行走影格序列：[x_idx, y_idx, duration_ms]
    // 模擬影片中的步態節奏：跨步(長) -> 縮腿(短) -> 落地(中)
    const walkSequence = [
        [0, 0, 130], // 第一步跨出
        [1, 0, 90],  // 過渡
        [2, 0, 130], // 第二步跨出
        [0, 1, 90],  // 過渡
        [1, 1, 130]  // 回到重心位
    ];
    const idleFrame = [2, 1]; // 腳步併攏待機
    const Y_OFFSET = -335; // 稍微下壓一點，讓腳掌感覺更有重量

    let isMoving = false, currentFrameIdx = 0, animTimeout = null, textPos = 270;
    let currentDir = 'R', autoWalkTimer = null;

    function animate() {
        if (!isMoving) return;
        const frame = walkSequence[currentFrameIdx];
        
        // 渲染白六
        dog.style.backgroundPosition = `-${frame[0] * 333}px ${Y_OFFSET}px`;
        
        // 文字位移 (隨影格時長動態調整速度)
        const moveStep = (frame[2] / 10); 
        textPos += (currentDir === 'R' ? -moveStep : moveStep);
        if (textPos < -msgDisplay.offsetWidth) textPos = 270;
        if (textPos > 270) textPos = -msgDisplay.offsetWidth;
        msgDisplay.style.left = textPos + "px";

        currentFrameIdx = (currentFrameIdx + 1) % walkSequence.length;
        animTimeout = setTimeout(animate, frame[2]);
    }

    function move(dir, pressed) {
        if (pressed) {
            clearTimeout(autoWalkTimer);
            if (isMoving && currentDir === dir) return;
            stopMovement();
            currentDir = dir;
            isMoving = true;
            container.style.transform = `scale(0.2) scaleX(${dir === 'L' ? -1 : 1})`;
            animate();
        } else {
            stopMovement();
            startAutoWalkCountdown();
        }
    }

    function stopMovement() {
        isMoving = false;
        clearTimeout(animTimeout);
        dog.style.backgroundPosition = `-${idleFrame[0] * 333}px ${Y_OFFSET}px`;
        currentFrameIdx = 0;
    }

    function startAutoWalkCountdown() {
        clearTimeout(autoWalkTimer);
        autoWalkTimer = setTimeout(() => {
            if (!isMoving) move('R', true);
        }, 1000);
    }

    // 初始自動散步
    startAutoWalkCountdown();

    window.addEventListener('mouseup', () => move('', false));
    window.addEventListener('touchend', () => move('', false));
</script>
</body>
</html>

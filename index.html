<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥白六傳情 - 自動散步版</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&family=Zen+Old+Mincho:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gba-color: #8b8b8b;
            --screen-bg: #9bbc0f; 
            --w: 333px; --h: 350px; 
            --pixel-green: #0f380f;
        }
        body {
            background-color: #1a1a1a;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 10px;
            font-family: sans-serif; touch-action: manipulation; -webkit-user-select: none;
        }
        .gba-body {
            width: 310px; height: 560px;
            background: var(--gba-color); border-radius: 15px 15px 80px 15px;
            display: flex; flex-direction: column; align-items: center;
            padding: 15px; position: relative;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 15px 15px 30px rgba(0,0,0,0.6);
        }
        .screen-area {
            width: 270px; height: 190px;
            background: var(--screen-bg); border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; margin-top: 20px; position: relative;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
        }
        #game-screen { width: 100%; height: 100%; position: relative; overflow: hidden; }
        #home-overlay {
            position: absolute; width: 100%; height: 100%;
            background: var(--screen-bg); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        #typing-text {
            font-size: 16px; font-weight: bold; color: var(--pixel-green);
            min-height: 4em; line-height: 1.5; margin-bottom: 10px;
        }
        #msg-display {
            position: absolute; white-space: nowrap; font-size: 150px; font-weight: 900;
            color: rgba(15, 56, 15, 0.15); 
            top: 50%; transform: translateY(-50%);
            left: 270px; pointer-events: none; line-height: 1;
            transition: color 0.3s ease, font-family 0.3s ease;
        }
        #sprite-container {
            width: var(--w); height: var(--h); position: absolute; left: 50%; bottom: 5px;
            margin-left: calc(var(--w) / -2); transform: scale(0.2); transform-origin: bottom center;
            overflow: hidden; z-index: 10;
        }
        #dog-sprite {
            width: 100%; height: 100%; background-image: url('image_8.png');
            background-repeat: no-repeat; background-size: 999px 700px;
            background-position: -666px -350px; image-rendering: pixelated;
        }
        .controls { width: 100%; display: flex; justify-content: space-between; margin-top: 35px; padding: 0 10px; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 40px); grid-template-rows: repeat(3, 40px); filter: drop-shadow(0 4px 0 #000); }
        .btn { background: #333; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .up { grid-column: 2; grid-row: 1; border-radius: 6px 6px 0 0; color: #fff; font-size: 10px; }
        .left { grid-column: 1; grid-row: 2; border-radius: 6px 0 0 6px; color: #fff; }
        .right { grid-column: 3; grid-row: 2; border-radius: 0 6px 6px 0; color: #fff; }
        .down { grid-column: 2; grid-row: 3; border-radius: 0 0 6px 6px; color: #fff; font-size: 10px; }
        .d-pad::after { content: ""; grid-column: 2; grid-row: 2; background: #333; }
        .action-btns { display: flex; gap: 15px; transform: rotate(-15deg); margin-top: 15px; }
        .round-btn { width: 50px; height: 50px; background: #8e1e3b; border-radius: 50%; box-shadow: 0 4px 0 #000; color: rgba(255,255,255,0.4); font-weight: bold; font-size: 14px; }
        .system-btns { display: flex; gap: 20px; margin-top: 45px; transform: rotate(-15deg); }
        .sys-group { text-align: center; cursor: pointer; }
        .pill-btn { width: 45px; height: 12px; background: #555; border-radius: 10px; box-shadow: 0 3px #222; }
        .sys-label { font-size: 9px; font-weight: bold; color: #333; margin-top: 6px; }
        .messenger-ui { margin-top: 20px; width: 310px; background: #2a2a2a; padding: 15px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; }
        #msg-input { background: #111; border: 1px solid #444; color: #9bbc0f; padding: 10px; border-radius: 8px; outline: none; }
        #copy-btn { background: #8e1e3b; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="gba-body">
    <div class="screen-area">
        <div id="home-overlay">
            <div id="typing-text"></div>
            <div id="start-prompt" style="visibility: hidden; font-size: 12px; font-weight: bold; color: #0f380f; animation: blink 1.2s infinite;">PRESS START</div>
        </div>
        <div id="game-screen">
            <div id="mute-icon" style="position: absolute; top:8px; right:8px; display:none; opacity:0.6;">🔇</div>
            <div id="msg-display">白六與你同行</div>
            <div id="sprite-container">
                <div id="dog-sprite"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="d-pad">
            <button class="btn up" onclick="changeFont()">F</button>
            <button class="btn left" ontouchstart="move('L', true)" onmousedown="move('L', true)">◀</button>
            <button class="btn right" ontouchstart="move('R', true)" onmousedown="move('R', true)">▶</button>
            <button class="btn down" onclick="changeColor()">C</button>
        </div>
        <div class="action-btns">
            <button class="btn round-btn" onclick="jump()">A</button>
            <button class="btn round-btn" onclick="toggleMute()">B</button>
        </div>
    </div>

    <div class="system-btns">
        <div class="sys-group" onclick="goHome()">
            <div class="pill-btn"></div>
            <div class="sys-label">SELECT</div>
        </div>
        <div class="sys-group" onclick="startGame()">
            <div class="pill-btn"></div>
            <div class="sys-label">START</div>
        </div>
    </div>
</div>

<div class="messenger-ui" id="ui-panel">
    <input type="text" id="msg-input" placeholder="說點什麼..." maxlength="30">
    <button id="copy-btn" onclick="generateLink()">🚀 產生並複製連結</button>
</div>

<audio id="bg-music" loop preload="auto">
    <source src="https://kuochili-ops.github.io/White6run/morning_sprite_walk.mp3" type="audio/mpeg">
</audio>

<script>
    const dog = document.getElementById('dog-sprite');
    const container = document.getElementById('sprite-container');
    const msgDisplay = document.getElementById('msg-display');
    const msgInput = document.getElementById('msg-input');
    const uiPanel = document.getElementById('ui-panel');
    const bgMusic = document.getElementById('bg-music');
    const homeOverlay = document.getElementById('home-overlay');
    const typingText = document.getElementById('typing-text');
    const startPrompt = document.getElementById('start-prompt');

    const walkFrames = [[0,0], [1,0], [2,0], [0,1], [1,1]]; 
    const idleFrame = [2,1];
    let isMoving = false, walkIdx = 0, animTimer = null, textPos = 270; 
    let musicStarted = false, isMuted = false;

    // 自動散步邏輯
    let autoWalkTimer = null;
    let isAutoWalking = false;

    const fonts = ['sans-serif', "'M PLUS Rounded 1c', sans-serif", "'Zen Old Mincho', serif"];
    const colors = ['rgba(15, 56, 15, 0.15)', 'rgba(15, 40, 80, 0.18)', 'rgba(100, 30, 30, 0.18)', 'rgba(30, 80, 30, 0.18)'];
    let fontIdx = 0, colorIdx = 0;

    function changeFont() { fontIdx = (fontIdx + 1) % fonts.length; msgDisplay.style.fontFamily = fonts[fontIdx]; resetAutoWalkTimer(); }
    function changeColor() { colorIdx = (colorIdx + 1) % colors.length; msgDisplay.style.color = colors[colorIdx]; resetAutoWalkTimer(); }

    const welcomeMsg = "你好，親友們❤️\n白六今天想跟你分享一段話...";
    function typeEffect() {
        typingText.innerText = ""; startPrompt.style.visibility = "hidden";
        let i = 0;
        const timer = setInterval(() => {
            typingText.innerText += welcomeMsg[i]; i++;
            if (i >= welcomeMsg.length) { clearInterval(timer); startPrompt.style.visibility = "visible"; }
        }, 80);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const sharedMsg = urlParams.get('msg');
    if (sharedMsg) { msgDisplay.innerText = decodeURIComponent(sharedMsg); uiPanel.style.display = "none"; }
    typeEffect();

    function startGame() {
        homeOverlay.style.display = "none";
        if (!isMuted) bgMusic.play().then(() => musicStarted = true).catch(() => {});
        resetAutoWalkTimer();
    }

    function goHome() {
        homeOverlay.style.display = "flex"; bgMusic.pause(); musicStarted = false;
        clearTimeout(autoWalkTimer); stopMovement();
        typeEffect();
    }

    function toggleMute() {
        isMuted = !isMuted; bgMusic.muted = isMuted;
        document.getElementById('mute-icon').style.display = isMuted ? "block" : "none";
        if (!isMuted && !musicStarted && homeOverlay.style.display === "none") { bgMusic.play(); musicStarted = true; }
        resetAutoWalkTimer();
    }

    function generateLink() {
        const text = msgInput.value.trim(); if (!text) return alert("請輸入內容");
        const finalUrl = `${window.location.origin}${window.location.pathname}?msg=${encodeURIComponent(text)}`;
        navigator.clipboard.writeText(finalUrl).then(() => alert("連結已複製！"));
        msgDisplay.innerText = text; startGame();
    }

    function move(dir, pressed) {
        if (homeOverlay.style.display !== "none") return;
        if (pressed) {
            clearTimeout(autoWalkTimer);
            isAutoWalking = false;
            startMovement(dir);
        } else {
            stopMovement();
            resetAutoWalkTimer();
        }
    }

    function startMovement(dir) {
        if (animTimer) return;
        isMoving = true;
        container.style.transform = `scale(0.2) scaleX(${dir === 'L' ? -1 : 1})`;
        animTimer = setInterval(() => {
            walkIdx = (walkIdx + 1) % walkFrames.length;
            dog.style.backgroundPosition = `-${walkFrames[walkIdx][0] * 333}px -${walkFrames[walkIdx][1] * 350}px`;
            textPos += (dir === 'R' ? -12 : 12);
            if (textPos < -msgDisplay.offsetWidth) textPos = 270;
            if (textPos > 270) textPos = -msgDisplay.offsetWidth;
            msgDisplay.style.left = textPos + "px";
        }, 100);
    }

    function stopMovement() {
        isMoving = false;
        clearInterval(animTimer);
        animTimer = null;
        dog.style.backgroundPosition = `-${idleFrame[0] * 333}px -${idleFrame[1] * 350}px`;
    }

    function resetAutoWalkTimer() {
        clearTimeout(autoWalkTimer);
        if (homeOverlay.style.display === "none" && !isMoving) {
            autoWalkTimer = setTimeout(() => {
                isAutoWalking = true;
                startMovement('R');
            }, 1000);
        }
    }

    function jump() {
        if (homeOverlay.style.display !== "none") return;
        resetAutoWalkTimer();
        container.style.transition = "bottom 0.2s ease-out";
        container.style.bottom = "80px";
        setTimeout(() => container.style.bottom = "5px", 200);
    }

    window.addEventListener('mouseup', () => move('', false));
    window.addEventListener('touchend', () => move('', false));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥白六世界時鐘 - Walk Engine Fixed</title>
    <style>
        :root {
            --gba-color: #8b8b8b;
            --screen-bg: #9bbc0f; 
            /* ⚠️ 根據 image_8.png 網格設定單幀尺寸 */
            --sprite-w: 333px; 
            --sprite-h: 350px; 
        }
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            touch-action: manipulation;
            overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }
        /* GBA 機體 */
        .gba-body {
            width: 320px;
            height: 560px;
            background: var(--gba-color);
            border-radius: 15px 15px 80px 15px;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 15px 15px 30px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        /* 螢幕外框 */
        .screen-bezel {
            width: 280px;
            height: 200px;
            background: #333;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            border: 4px solid #111;
            position: relative;
            overflow: hidden;
        }
        #game-screen {
            width: 240px;
            height: 160px;
            background: var(--screen-bg);
            position: relative;
        }
        /* 滾動背景層 (產生移動感) */
        #scrolling-bg {
            position: absolute;
            top: 0;
            left: -50px;
            width: 400px;
            height: 100%;
            /* 繪製簡單的網格背景 */
            background-image: 
                linear-gradient(90deg, rgba(15, 56, 15, 0.1) 1px, transparent 1px),
                linear-gradient(rgba(15, 56, 15, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .ground {
            position: absolute;
            bottom: 30px;
            width: 100%;
            height: 2px;
            background: #0f380f;
            opacity: 0.5;
        }
        /* 白六精靈圖元件 */
        #dog-sprite {
            width: var(--sprite-w);
            height: var(--sprite-h);
            background-image: url('image_8.png'); /* 確保檔名正確 */
            background-repeat: no-repeat;
            background-position: 0px 0px;
            image-rendering: pixelated;
            position: absolute;
            
            /* 固定在中間 */
            left: 50%;
            margin-left: calc(var(--sprite-w) / -2); 
            bottom: 30px;
            
            /* CSS 縮放 */
            transform: scale(0.2); 
            transform-origin: bottom center;
            
            transition: bottom 0.1s ease-out; /* 跳躍用 */
        }
        /* 控制區 */
        .controls { width: 100%; display: flex; justify-content: space-between; padding: 0 10px; }
        .d-pad { display: grid; grid-template-columns: 45px 45px 45px; grid-template-rows: 45px 45px 45px; }
        .btn { background: #333; color: #777; border: none; cursor: pointer; box-shadow: 0 4px #000; font-size: 18px; display: flex; justify-content: center; align-items: center; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; background: #111; }
        .up { grid-column: 2; grid-row: 1; border-radius: 5px 5px 0 0; }
        .left { grid-column: 1; grid-row: 2; border-radius: 5px 0 0 5px; }
        .right { grid-column: 3; grid-row: 2; border-radius: 0 5px 5px 0; }
        .down { grid-column: 2; grid-row: 3; border-radius: 0 0 5px 5px; }
        .action-btns { display: flex; gap: 20px; transform: rotate(-15deg); margin-top: 20px; }
        .round-btn { width: 55px; height: 55px; background: #8e1e3b; border-radius: 50%; box-shadow: 0 5px #5e1327; color: rgba(255,255,255,0.4); font-weight: bold; }
    </style>
</head>
<body>

<div class="gba-body">
    <div style="font-size: 10px; color: #555; margin-bottom: 5px;">DOT MATRIX WITH STEREO SOUND</div>
    <div class="screen-bezel">
        <div id="game-screen">
            <div id="scrolling-bg"></div>
            <div class="ground"></div>
            <div id="dog-sprite"></div>
        </div>
    </div>
    <div class="controls">
        <div class="d-pad">
            <button class="btn up">▲</button>
            <button class="btn left" ontouchstart="setKey('ArrowLeft', true)" onmousedown="setKey('ArrowLeft', true)">◀</button>
            <button class="btn right" ontouchstart="setKey('ArrowRight', true)" onmousedown="setKey('ArrowRight', true)">▶</button>
            <button class="btn down">▼</button>
        </div>
        <div class="action-btns">
            <button class="btn round-btn" ontouchstart="setKey('KeyX', true)" onmousedown="setKey('KeyX', true)">B</button>
            <button class="btn round-btn" ontouchstart="jump()">A</button>
        </div>
    </div>
</div>

<script>
    const dogSprite = document.getElementById('dog-sprite');
    const scrollingBg = document.getElementById('scrolling-bg');
    
    // image_8.png 參數
    const frameW = 333; 
    const frameH = 350; 
    const cols = 3; 
    const totalFrames = 6;

    let keys = {};
    let isMoving = false;
    let currentFrame = 0;
    let animInterval = null;
    let bgPos = 0;
    let facing = 1;
    let isJumping = false;

    function setKey(code, isPressed) {
        keys[code] = isPressed;
        const moveKeyPressed = keys['ArrowLeft'] || keys['ArrowRight'];
        
        if (moveKeyPressed && !isMoving) {
            isMoving = true;
            startAnimation();
        } else if (!moveKeyPressed && isMoving) {
            isMoving = false;
            stopAnimation();
        }
    }

    // A 鍵跳躍
    function jump() {
        if (isJumping) return;
        isJumping = true;
        dogSprite.style.bottom = "85px"; // 向上跳
        setTimeout(() => {
            dogSprite.style.bottom = "30px"; // 落地
            setTimeout(() => { isJumping = false; }, 100);
        }, 250);
    }

    // 幀切換邏輯 (2列x3欄)
    function startAnimation() {
        if (animInterval) clearInterval(animInterval);
        animInterval = setInterval(() => {
            currentFrame = (currentFrame + 1) % totalFrames;
            const col = currentFrame % cols;
            const row = Math.floor(currentFrame / cols);
            dogSprite.style.backgroundPosition = `-${col * frameW}px -${row * frameH}px`;
        }, 110);
    }

    function stopAnimation() {
        clearInterval(animInterval);
        animInterval = null;
        currentFrame = 0;
        dogSprite.style.backgroundPosition = "0px 0px";
    }

    function loop() {
        let speed = keys['KeyX'] ? 5 : 2.5; // B 鍵跑步

        if (keys['ArrowRight']) {
            bgPos -= speed;
            facing = 1;
        } else if (keys['ArrowLeft']) {
            bgPos += speed;
            facing = -1;
        }

        // 移動背景產生踏步感
        scrollingBg.style.transform = `translateX(${bgPos % 40}px)`;
        // 更新轉向
        dogSprite.style.transform = `scale(0.2) scaleX(${facing})`;

        requestAnimationFrame(loop);
    }

    // 滑鼠與觸控釋放監聽
    const releaseKeys = () => { keys = {}; stopAnimation(); isMoving = false; };
    window.addEventListener('mouseup', releaseKeys);
    window.addEventListener('touchend', releaseKeys);
    window.addEventListener('keydown', e => setKey(e.code, true));
    window.addEventListener('keyup', e => setKey(e.code, false));

    loop();
</script>
</body>
</html>

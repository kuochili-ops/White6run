<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥白六傳情 - 音樂動態版</title>
    <style>
        :root {
            --gba-color: #8b8b8b;
            --screen-bg: #9bbc0f; 
            --w: 333px; --h: 350px; 
        }
        body {
            background-color: #1a1a1a;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 10px;
            font-family: 'PingFang TC', sans-serif; touch-action: manipulation; -webkit-user-select: none;
        }

        /* Game Boy 主機樣式 */
        .gba-body {
            width: 310px; height: 560px;
            background: var(--gba-color);
            border-radius: 15px 15px 80px 15px;
            display: flex; flex-direction: column; align-items: center;
            padding: 15px; position: relative;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 15px 15px 30px rgba(0,0,0,0.6);
        }

        .screen-bezel {
            width: 270px; height: 190px;
            background: #333; border-radius: 5px;
            display: flex; justify-content: center; align-items: center;
            border: 4px solid #111; overflow: hidden; margin-top: 10px;
        }
        #game-screen {
            width: 230px; height: 150px;
            background: var(--screen-bg); position: relative; overflow: hidden;
        }

        /* 背景大型訊息 */
        #msg-display {
            position: absolute;
            white-space: nowrap;
            font-size: 140px; 
            font-weight: 900;
            color: rgba(0, 0, 0, 0.12);
            top: 50%;
            transform: translateY(-50%);
            left: 230px; 
            pointer-events: none;
            line-height: 1;
        }

        /* 白六角色 */
        #sprite-container {
            width: var(--w); height: var(--h);
            position: absolute; left: 50%; bottom: 5px;
            margin-left: calc(var(--w) / -2);
            transform: scale(0.18); transform-origin: bottom center;
            overflow: hidden; z-index: 10;
        }
        #dog-sprite {
            width: 100%; height: 100%;
            background-image: url('image_8.png');
            background-repeat: no-repeat;
            background-size: 999px 700px;
            background-position: -666px -350px; 
            image-rendering: pixelated;
        }

        /* 控制器排列 */
        .controls { width: 100%; display: flex; justify-content: space-between; margin-top: 20px; padding: 0 10px; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 40px); grid-template-rows: repeat(3, 40px); }
        .btn { background: #333; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px #000; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; background: #222; }
        
        .up, .down { opacity: 0.3; }
        .left { grid-column: 1; grid-row: 2; border-radius: 4px 0 0 4px; background: #444; color: #fff; }
        .right { grid-column: 3; grid-row: 2; border-radius: 0 4px 4px 0; background: #444; color: #fff; }

        .action-btns { display: flex; gap: 12px; transform: rotate(-15deg); margin-top: 10px; }
        .round-btn { width: 48px; height: 48px; background: #8e1e3b; border-radius: 50%; color: rgba(255,255,255,0.2); font-weight: bold; }

        .system-btns { display: flex; gap: 18px; margin-top: 35px; transform: rotate(-15deg); }
        .pill-btn { width: 40px; height: 10px; background: #555; border-radius: 10px; box-shadow: 0 3px #222; }

        /* 下方操作面板 */
        .messenger-ui {
            margin-top: 20px; width: 310px;
            background: #2a2a2a; padding: 15px; border-radius: 15px;
            display: flex; flex-direction: column; gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        #msg-input { background: #111; border: 1px solid #444; color: #9bbc0f; padding: 10px; border-radius: 8px; outline: none; }
        #copy-btn { background: #8e1e3b; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="gba-body">
    <div class="screen-bezel">
        <div id="game-screen">
            <div id="msg-display">白六與你同行</div>
            <div id="sprite-container">
                <div id="dog-sprite"></div>
            </div>
        </div>
    </div>
    
    <div class="controls">
        <div class="d-pad">
            <button class="btn up" onmousedown="tryPlayMusic()"></button>
            <button class="btn left" ontouchstart="move('L', true)" onmousedown="move('L', true)">◀</button>
            <button class="btn right" ontouchstart="move('R', true)" onmousedown="move('R', true)">▶</button>
            <button class="btn down" onmousedown="tryPlayMusic()"></button>
        </div>
        <div class="action-btns">
            <button class="btn round-btn" ontouchstart="jump()" onmousedown="tryPlayMusic()">A</button>
            <button class="btn round-btn" onmousedown="tryPlayMusic()">B</button>
        </div>
    </div>

    <div class="system-btns">
        <div style="text-align:center"><div class="pill-btn"></div><div style="font-size:8px; color:#333; font-weight:bold; margin-top:3px">SELECT</div></div>
        <div style="text-align:center"><div class="pill-btn"></div><div style="font-size:8px; color:#333; font-weight:bold; margin-top:3px">START</div></div>
    </div>
</div>

<div class="messenger-ui" id="ui-panel">
    <input type="text" id="msg-input" placeholder="輸入你想說的話..." maxlength="30">
    <button id="copy-btn" onclick="generateLink()">🚀 產生並複製分享連結</button>
</div>

<audio id="bg-music" loop>
    <source src="Morning_sprite_walk.mp3" type="audio/mpeg">
</audio>

<script>
    const dog = document.getElementById('dog-sprite');
    const container = document.getElementById('sprite-container');
    const msgDisplay = document.getElementById('msg-display');
    const msgInput = document.getElementById('msg-input');
    const uiPanel = document.getElementById('ui-panel');
    const bgMusic = document.getElementById('bg-music');

    const walkFrames = [[0,0], [1,0], [2,0], [0,1], [1,1]]; 
    const idleFrame = [2,1];

    let isMoving = false, walkIdx = 0, animTimer = null;
    let textPos = 230; 
    let currentDir = 'R';
    let message = "白六與你同行";
    let musicStarted = false;

    // 啟動音樂
    function tryPlayMusic() {
        if (!musicStarted) {
            bgMusic.play().catch(e => console.log("等待互動以播放音樂"));
            musicStarted = true;
        }
    }

    // 初始化檢測 URL
    const urlParams = new URLSearchParams(window.location.search);
    const sharedMsg = urlParams.get('msg');
    if (sharedMsg) {
        message = decodeURIComponent(sharedMsg);
        msgDisplay.innerText = message;
        uiPanel.style.display = "none";
    }

    function setFrame(coords) {
        dog.style.backgroundPosition = `-${coords[0] * 333}px -${coords[1] * 350}px`;
    }

    function generateLink() {
        const text = msgInput.value.trim();
        if (!text) return alert("請輸入內容");
        tryPlayMusic(); // 產生連結時順便啟動音樂

        const baseUrl = window.location.origin + window.location.pathname;
        const finalUrl = `${baseUrl}?msg=${encodeURIComponent(text)}`;
        navigator.clipboard.writeText(finalUrl).then(() => alert("連結已複製！快傳給對方看看。"));
        
        message = text;
        msgDisplay.innerText = message;
        textPos = 230;
        msgDisplay.style.left = textPos + "px";
    }

    function move(dir, pressed) {
        if (!message) return;
        tryPlayMusic(); // 按下按鍵時啟動音樂
        if (pressed) {
            isMoving = true;
            currentDir = dir;
            const facing = (dir === 'L') ? -1 : 1;
            container.style.transform = `scale(0.18) scaleX(${facing})`;
            
            if (!animTimer) {
                animTimer = setInterval(() => {
                    walkIdx = (walkIdx + 1) % walkFrames.length;
                    setFrame(walkFrames[walkIdx]);
                    
                    // 雙向位移
                    if (currentDir === 'R') textPos -= 10;
                    else textPos += 10;
                    
                    const textWidth = msgDisplay.offsetWidth;
                    if (textPos < -textWidth) textPos = 230;
                    if (textPos > 230) textPos = -textWidth;
                    
                    msgDisplay.style.left = textPos + "px";
                }, 100);
            }
        } else {
            isMoving = false;
            clearInterval(animTimer); animTimer = null;
            setFrame(idleFrame);
        }
    }

    function jump() {
        tryPlayMusic();
        container.style.transition = "bottom 0.2s ease-out";
        container.style.bottom = "80px";
        setTimeout(() => container.style.bottom = "5px", 200);
    }

    const stop = () => move(currentDir, false);
    window.addEventListener('mouseup', stop);
    window.addEventListener('touchend', stop);
</script>
</body>
</html>

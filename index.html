<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥白六傳情 - 完整遊戲版</title>
    <style>
        :root {
            --gba-color: #8b8b8b;
            --screen-bg: #9bbc0f; 
            --w: 333px; --h: 350px; 
        }
        body {
            background-color: #1a1a1a;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 10px;
            font-family: 'monospace', 'PingFang TC', sans-serif; touch-action: manipulation; -webkit-user-select: none;
        }
        .gba-body {
            width: 310px; height: 560px;
            background: var(--gba-color); border-radius: 15px 15px 80px 15px;
            display: flex; flex-direction: column; align-items: center;
            padding: 15px; position: relative;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 15px 15px 30px rgba(0,0,0,0.6);
        }
        .screen-bezel {
            width: 270px; height: 190px;
            background: #333; border-radius: 5px;
            display: flex; justify-content: center; align-items: center;
            border: 4px solid #111; overflow: hidden; margin-top: 10px; position: relative;
        }
        #game-screen {
            width: 230px; height: 150px;
            background: var(--screen-bg); position: relative; overflow: hidden;
        }

        /* --- 遊戲首頁樣式 --- */
        #home-overlay {
            position: absolute; width: 100%; height: 100%;
            background: var(--screen-bg); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 10px; box-sizing: border-box; text-align: center;
        }
        #typing-text {
            font-size: 16px; font-weight: bold; color: #0f380f;
            min-height: 3em; line-height: 1.4; margin-bottom: 20px;
        }
        .blink-text {
            font-size: 12px; color: #0f380f; font-weight: bold;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- 遊戲內部樣式 --- */
        #msg-display {
            position: absolute; white-space: nowrap; font-size: 150px; font-weight: 900;
            color: rgba(0, 0, 0, 0.12); top: 50%; transform: translateY(-50%);
            left: 230px; pointer-events: none; line-height: 1;
        }
        #mute-icon {
            position: absolute; top: 5px; right: 5px; font-size: 14px; opacity: 0.5; display: none;
        }
        #sprite-container {
            width: var(--w); height: var(--h); position: absolute; left: 50%; bottom: 5px;
            margin-left: calc(var(--w) / -2); transform: scale(0.18); transform-origin: bottom center;
            overflow: hidden; z-index: 10;
        }
        #dog-sprite {
            width: 100%; height: 100%; background-image: url('image_8.png');
            background-repeat: no-repeat; background-size: 999px 700px;
            background-position: -666px -350px; image-rendering: pixelated;
        }

        /* 控制器 */
        .controls { width: 100%; display: flex; justify-content: space-between; margin-top: 30px; padding: 0 10px; }
        .d-pad { display: grid; grid-template-columns: 40px 40px 40px; grid-template-rows: 40px 40px 40px; filter: drop-shadow(0 4px 0 #000); }
        .btn { background: #333; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.1s; }
        .up { grid-column: 2; grid-row: 1; border-radius: 6px 6px 0 0; }
        .left { grid-column: 1; grid-row: 2; border-radius: 6px 0 0 6px; color: #fff; }
        .right { grid-column: 3; grid-row: 2; border-radius: 0 6px 6px 0; color: #fff; }
        .down { grid-column: 2; grid-row: 3; border-radius: 0 0 6px 6px; }
        .d-pad::after { content: ""; grid-column: 2; grid-row: 2; background: #333; }
        
        .action-btns { display: flex; gap: 12px; transform: rotate(-15deg); margin-top: 15px; }
        .round-btn { width: 50px; height: 50px; background: #8e1e3b; border-radius: 50%; box-shadow: 0 4px 0 #000; color: rgba(255,255,255,0.4); font-weight: bold; font-size: 14px; }
        .round-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }

        .system-btns { display: flex; gap: 20px; margin-top: 40px; transform: rotate(-15deg); }
        .sys-group { text-align: center; cursor: pointer; }
        .pill-btn { width: 45px; height: 12px; background: #555; border-radius: 10px; box-shadow: 0 3px #222; }
        .sys-label { font-size: 8px; font-weight: bold; color: #333; margin-top: 5px; }

        .messenger-ui { margin-top: 20px; width: 310px; background: #2a2a2a; padding: 15px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; }
        #msg-input { background: #111; border: 1px solid #444; color: #9bbc0f; padding: 10px; border-radius: 8px; outline: none; }
        #copy-btn { background: #8e1e3b; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="gba-body">
    <div class="screen-bezel">
        <div id="home-overlay">
            <div id="typing-text"></div>
            <div id="start-prompt" class="blink-text" style="visibility: hidden;">PRESS START</div>
        </div>

        <div id="game-screen">
            <div id="mute-icon">🔇</div>
            <div id="msg-display">白六與你同行</div>
            <div id="sprite-container">
                <div id="dog-sprite"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="d-pad">
            <button class="btn up"></button>
            <button class="btn left" ontouchstart="move('L', true)" onmousedown="move('L', true)">◀</button>
            <button class="btn right" ontouchstart="move('R', true)" onmousedown="move('R', true)">▶</button>
            <button class="btn down"></button>
        </div>
        <div class="action-btns">
            <button class="btn round-btn" onclick="jump()">A</button>
            <button class="btn round-btn" onclick="toggleMute()">B</button>
        </div>
    </div>

    <div class="system-btns">
        <div class="sys-group" onclick="goHome()">
            <div class="pill-btn"></div>
            <div class="sys-label">SELECT</div>
        </div>
        <div class="sys-group" onclick="startGame()">
            <div class="pill-btn"></div>
            <div class="sys-label">START</div>
        </div>
    </div>
</div>

<div class="messenger-ui" id="ui-panel">
    <input type="text" id="msg-input" placeholder="輸入訊息..." maxlength="30">
    <button id="copy-btn" onclick="generateLink()">🚀 產生並複製連結</button>
</div>

<audio id="bg-music" loop preload="auto">
    <source src="https://kuochili-ops.github.io/White6run/morning_sprite_walk.mp3" type="audio/mpeg">
</audio>

<script>
    const dog = document.getElementById('dog-sprite');
    const container = document.getElementById('sprite-container');
    const msgDisplay = document.getElementById('msg-display');
    const msgInput = document.getElementById('msg-input');
    const uiPanel = document.getElementById('ui-panel');
    const bgMusic = document.getElementById('bg-music');
    const homeOverlay = document.getElementById('home-overlay');
    const typingText = document.getElementById('typing-text');
    const startPrompt = document.getElementById('start-prompt');
    const muteIcon = document.getElementById('mute-icon');

    const walkFrames = [[0,0], [1,0], [2,0], [0,1], [1,1]]; 
    const idleFrame = [2,1];
    let isMoving = false, walkIdx = 0, animTimer = null;
    let textPos = 230; 
    let musicStarted = false;
    let isMuted = false;

    // 首頁打字效果
    const welcomeMsg = "你好，親友們❤️\n白六今天想跟你一起散步。";
    function typeEffect() {
        typingText.innerText = "";
        startPrompt.style.visibility = "hidden";
        let i = 0;
        const timer = setInterval(() => {
            typingText.innerText += welcomeMsg[i];
            i++;
            if (i >= welcomeMsg.length) {
                clearInterval(timer);
                startPrompt.style.visibility = "visible";
            }
        }, 100);
    }

    // 初始化檢測
    const urlParams = new URLSearchParams(window.location.search);
    const sharedMsg = urlParams.get('msg');
    if (sharedMsg) {
        msgDisplay.innerText = decodeURIComponent(sharedMsg);
        uiPanel.style.display = "none";
    }
    typeEffect();

    function startGame() {
        homeOverlay.style.display = "none";
        if (!isMuted) {
            bgMusic.play().then(() => musicStarted = true).catch(() => {});
        }
    }

    function goHome() {
        homeOverlay.style.display = "flex";
        bgMusic.pause();
        musicStarted = false;
        typeEffect();
    }

    function toggleMute() {
        isMuted = !isMuted;
        bgMusic.muted = isMuted;
        muteIcon.style.display = isMuted ? "block" : "none";
        if (!isMuted && !musicStarted) {
            bgMusic.play();
            musicStarted = true;
        }
    }

    function generateLink() {
        const text = msgInput.value.trim();
        if (!text) return alert("請輸入內容");
        const baseUrl = window.location.origin + window.location.pathname;
        const finalUrl = `${baseUrl}?msg=${encodeURIComponent(text)}`;
        navigator.clipboard.writeText(finalUrl).then(() => alert("連結已複製！"));
        msgDisplay.innerText = text;
        startGame(); // 自動進入遊戲
    }

    function move(dir, pressed) {
        if (homeOverlay.style.display !== "none") return;
        if (pressed) {
            isMoving = true;
            container.style.transform = `scale(0.18) scaleX(${dir === 'L' ? -1 : 1})`;
            if (!animTimer) {
                animTimer = setInterval(() => {
                    walkIdx = (walkIdx + 1) % walkFrames.length;
                    dog.style.backgroundPosition = `-${walkFrames[walkIdx][0] * 333}px -${walkFrames[walkIdx][1] * 350}px`;
                    dir === 'R' ? textPos -= 12 : textPos += 12;
                    if (textPos < -msgDisplay.offsetWidth) textPos = 230;
                    if (textPos > 230) textPos = -msgDisplay.offsetWidth;
                    msgDisplay.style.left = textPos + "px";
                }, 100);
            }
        } else {
            isMoving = false;
            clearInterval(animTimer); animTimer = null;
            dog.style.backgroundPosition = `-${idleFrame[0] * 333}px -${idleFrame[1] * 350}px`;
        }
    }

    function jump() {
        if (homeOverlay.style.display !== "none") return;
        container.style.transition = "bottom 0.2s ease-out";
        container.style.bottom = "80px";
        setTimeout(() => container.style.bottom = "5px", 200);
    }

    window.addEventListener('mouseup', () => move('', false));
    window.addEventListener('touchend', () => move('', false));
</script>
</body>
</html>

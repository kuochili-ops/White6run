<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>White 6 GBA - Fixed</title>
    <style>
        :root {
            --gba-color: #8b8b8b;
            --screen-bg: #9bbc0f; 
            /* 調整後的單幀比例 (依據 3x2 網格) */
            --sprite-w: 333px; 
            --sprite-h: 350px; 
        }
        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            touch-action: manipulation;
            overflow: hidden;
        }
        .gba-body {
            width: 320px;
            height: 540px;
            background: var(--gba-color);
            border-radius: 15px 15px 70px 15px;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 15px 15px 30px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .screen-bezel {
            width: 280px;
            height: 200px;
            background: #333;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden; /* 確保白六不會跑出螢幕 */
        }
        #game-screen {
            width: 240px;
            height: 160px;
            background: var(--screen-bg);
            position: relative;
            border: 2px solid #000;
        }
        /* 核心修正：使用 background-size 並縮放容器 */
        #dog-sprite {
            width: var(--sprite-w);
            height: var(--sprite-h);
            background-image: url('image_8.PNG'); 
            background-repeat: no-repeat;
            background-position: 0px 0px;
            image-rendering: pixelated;
            position: absolute;
            /* 將巨大的原始圖縮小到適合螢幕的大小 */
            transform: scale(0.18); 
            transform-origin: bottom center;
            bottom: 30px; /* 站在地平線上 */
            left: 50%;
        }
        /* 地平線 */
        .ground {
            position: absolute;
            bottom: 30px;
            width: 100%;
            height: 2px;
            background: #0f380f;
        }
        /* 控制按鈕 */
        .controls { width: 100%; display: flex; justify-content: space-between; padding: 0 10px; margin-top: 20px; }
        .d-pad { display: grid; grid-template-columns: 45px 45px 45px; grid-template-rows: 45px 45px 45px; }
        .btn { background: #222; color: #555; border: none; box-shadow: 0 4px #000; display: flex; justify-content: center; align-items: center; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; background: #111; }
        .up { grid-column: 2; grid-row: 1; border-radius: 5px 5px 0 0; }
        .left { grid-column: 1; grid-row: 2; border-radius: 5px 0 0 5px; }
        .right { grid-column: 3; grid-row: 2; border-radius: 0 5px 5px 0; }
        .down { grid-column: 2; grid-row: 3; border-radius: 0 0 5px 5px; }
        .action-btns { display: flex; gap: 15px; transform: rotate(-15deg); }
        .round-btn { width: 55px; height: 55px; background: #8e1e3b; border-radius: 50%; box-shadow: 0 5px #5e1327; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="gba-body">
    <div style="font-size: 10px; color: #555; margin-bottom: 5px;">DOT MATRIX WITH STEREO SOUND</div>
    <div class="screen-bezel">
        <div id="game-screen">
            <div class="ground"></div>
            <div id="dog-sprite"></div>
        </div>
    </div>

    <div class="controls">
        <div class="d-pad">
            <button class="btn up" onmousedown="setKey('ArrowUp', true)" onmouseup="setKey('ArrowUp', false)" ontouchstart="setKey('ArrowUp', true)">▲</button>
            <button class="btn left" onmousedown="setKey('ArrowLeft', true)" onmouseup="setKey('ArrowLeft', false)" ontouchstart="setKey('ArrowLeft', true)">◀</button>
            <button class="btn right" onmousedown="setKey('ArrowRight', true)" onmouseup="setKey('ArrowRight', false)" ontouchstart="setKey('ArrowRight', true)">▶</button>
            <button class="btn down" onmousedown="setKey('ArrowDown', true)" onmouseup="setKey('ArrowDown', false)" ontouchstart="setKey('ArrowDown', true)">▼</button>
        </div>
        <div class="action-btns">
            <button class="btn round-btn" onmousedown="setKey('KeyX', true)" onmouseup="setKey('KeyX', false)" ontouchstart="setKey('KeyX', true)">B</button>
            <button class="btn round-btn" onmousedown="setKey('KeyZ', true)" onmouseup="setKey('KeyZ', false)" ontouchstart="setKey('KeyZ', true)">A</button>
        </div>
    </div>
</div>

<script>
    const dog = document.getElementById('dog-sprite');
    const frameW = 333; // 修正：依據 1000px 寬度圖檔除以 3
    const frameH = 350; // 修正：依據 700px 高度圖檔除以 2
    
    let keys = {};
    let currentFrame = 0;
    let posX = 120;
    let isMoving = false;
    let animTimer = null;
    let facing = 1;

    function setKey(k, v) { 
        keys[k] = v; 
        if ((keys['ArrowLeft'] || keys['ArrowRight']) && !isMoving) {
            isMoving = true;
            startAnim();
        } else if (!keys['ArrowLeft'] && !keys['ArrowRight']) {
            isMoving = false;
            stopAnim();
        }
    }

    function startAnim() {
        animTimer = setInterval(() => {
            currentFrame = (currentFrame + 1) % 6;
            const col = currentFrame % 3;
            const row = Math.floor(currentFrame / 3);
            dog.style.backgroundPosition = `-${col * frameW}px -${row * frameH}px`;
        }, 120);
    }

    function stopAnim() {
        clearInterval(animTimer);
        currentFrame = 0;
        dog.style.backgroundPosition = "0px 0px";
    }

    function loop() {
        let speed = keys['KeyX'] ? 3 : 1.5;
        if (keys['ArrowRight']) { posX += speed; facing = 1; }
        if (keys['ArrowLeft']) { posX -= speed; facing = -1; }
        
        posX = Math.max(20, Math.min(220, posX));
        dog.style.left = `calc(${posX}px - ${frameW/2}px)`;
        dog.style.transform = `scale(0.18) scaleX(${facing})`;
        
        requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', e => setKey(e.code, true));
    window.addEventListener('keyup', e => setKey(e.code, false));
    loop();
</script>
</body>
</html>

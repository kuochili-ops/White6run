<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥白六世界時鐘</title>
    <style>
        :root {
            --gba-color: #8b8b8b;
            --screen-bg: #9bbc0f; 
            /* ⚠️ 單格精確尺寸 */
            --w: 333px; 
            --h: 350px; 
        }
        body {
            background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
            touch-action: manipulation; -webkit-user-select: none;
        }
        .gba-body {
            width: 320px; height: 560px;
            background: var(--gba-color);
            border-radius: 15px 15px 80px 15px;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; position: relative;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 15px 15px 30px rgba(0,0,0,0.6);
        }
        .screen-bezel {
            width: 280px; height: 200px;
            background: #333; border-radius: 5px;
            display: flex; justify-content: center; align-items: center;
            border: 4px solid #111; overflow: hidden;
        }
        #game-screen {
            width: 240px; height: 160px;
            background: var(--screen-bg); position: relative;
        }
        /* 狗狗容器：嚴格限制顯示範圍為單一格 */
        #sprite-container {
            width: var(--w); height: var(--h);
            position: absolute; left: 50%; bottom: 20px;
            margin-left: calc(var(--w) / -2);
            /* ⚠️ 縮放狗狗到適合螢幕的大小 */
            transform: scale(0.2); 
            transform-origin: bottom center;
            overflow: hidden; /* 確保不漏出隔壁動作 */
        }
        #dog-sprite {
            width: 100%; height: 100%;
            background-image: url('image_8.png');
            background-repeat: no-repeat;
            /* ⚠️ 鎖定總圖尺寸，防止自動縮放 */
            background-size: 999px 700px; 
            /* 預設顯示編號 6 (下右圖) */
            background-position: -666px -350px; 
            image-rendering: pixelated;
        }
        /* 按鈕區 */
        .controls { width: 100%; display: flex; justify-content: space-between; margin-top: 30px; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 45px); grid-template-rows: repeat(3, 45px); }
        .btn { background: #333; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px #000; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; background: #222; }
        .up { grid-column: 2; grid-row: 1; border-radius: 5px 5px 0 0; }
        .left { grid-column: 1; grid-row: 2; border-radius: 5px 0 0 5px; }
        .right { grid-column: 3; grid-row: 2; border-radius: 0 5px 5px 0; }
        .down { grid-column: 2; grid-row: 3; border-radius: 0 0 5px 5px; }
        .action-btns { display: flex; gap: 15px; transform: rotate(-15deg); margin-top: 20px; }
        .round-btn { width: 55px; height: 55px; background: #8e1e3b; border-radius: 50%; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="gba-body">
    <div class="screen-bezel">
        <div id="game-screen">
            <div id="sprite-container">
                <div id="dog-sprite"></div>
            </div>
        </div>
    </div>
    <div class="controls">
        <div class="d-pad">
            <button class="btn up">▲</button>
            <button class="btn left" ontouchstart="move('ArrowLeft', true)" onmousedown="move('ArrowLeft', true)">◀</button>
            <button class="btn right" ontouchstart="move('ArrowRight', true)" onmousedown="move('ArrowRight', true)">▶</button>
            <button class="btn down">▼</button>
        </div>
        <div class="action-btns">
            <button class="btn round-btn" ontouchstart="jump()">A</button>
            <button class="btn round-btn">B</button>
        </div>
    </div>
</div>

<script>
    const dog = document.getElementById('dog-sprite');
    const container = document.getElementById('sprite-container');
    
    // 動作序列位移 (x 索引, y 索引)
    const walkFrames = [[0,0], [1,0], [2,0], [0,1], [1,1]]; // 1~5
    const idleFrame = [2,1]; // 6

    let isMoving = false, walkIdx = 0, animTimer = null, facing = 1;

    function setFrame(coords) {
        // 使用精確像素位移
        dog.style.backgroundPosition = `-${coords[0] * 333}px -${coords[1] * 350}px`;
    }

    function move(dir, pressed) {
        if (pressed) {
            isMoving = true;
            facing = (dir === 'ArrowLeft') ? -1 : 1;
            container.style.transform = `scale(0.2) scaleX(${facing})`;
            if (!animTimer) {
                animTimer = setInterval(() => {
                    walkIdx = (walkIdx + 1) % walkFrames.length;
                    setFrame(walkFrames[walkIdx]);
                }, 120);
            }
        } else {
            isMoving = false;
            clearInterval(animTimer); animTimer = null;
            setFrame(idleFrame);
        }
    }

    function jump() {
        container.style.bottom = "80px";
        setTimeout(() => container.style.bottom = "20px", 250);
    }

    const stop = () => move('', false);
    window.addEventListener('mouseup', stop);
    window.addEventListener('touchend', stop);
</script>
</body>
</html>

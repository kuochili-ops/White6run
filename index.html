<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>White 6 GBA Controller</title>
    <style>
        :root {
            --gba-color: #8b8b8b;
            --screen-bg: #d0f0c0; /* 經典 GB 螢幕色 */
            --magenta: #d33682;
            /* 單幀像素尺寸，需要根據你的圖片解析度精確調整 */
            --sprite-w: 70px; 
            --sprite-h: 75px; 
        }
        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            touch-action: manipulation;
            overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }
        /* GBA 機體介面 */
        .gba-body {
            width: 320px;
            height: 540px;
            background: var(--gba-color);
            border-radius: 10px 10px 60px 10px;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 15px 15px 30px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        /* 螢幕 */
        .screen-bezel {
            width: 280px;
            height: 200px;
            background: #333;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            border: 3px solid #111;
            position: relative;
        }
        canvas {
            width: 240px;
            height: 160px;
            background: var(--screen-bg);
            image-rendering: pixelated;
        }
        /* 真正的白六精靈圖渲染區域 (CSS 實現動畫) */
        #dog-sprite {
            width: var(--sprite-w);
            height: var(--sprite-h);
            /* **⚠️ 請確保這裡的圖片檔名與你實際儲存的貼圖檔名一致** */
            background-image: url('image_8.PNG'); 
            background-repeat: no-repeat;
            background-position: 0px 0px; /* 初始幀 */
            position: absolute;
            image-rendering: pixelated;
            /* 微調位置使其站在螢幕中央地平線上 */
            left: calc(50% - (var(--sprite-w) / 2));
            top: calc(50% - (var(--sprite-h) / 2) + 40px);
            transition: transform 0.1s linear;
        }
        /* 控制區 */
        .controls {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }
        .d-pad {
            display: grid;
            grid-template-columns: 40px 40px 40px;
            grid-template-rows: 40px 40px 40px;
        }
        .btn {
            background: #222;
            color: #444;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px #000;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; background: #111; }
        
        .up    { grid-column: 2; grid-row: 1; border-radius: 5px 5px 0 0; }
        .down  { grid-column: 2; grid-row: 3; border-radius: 0 0 5px 5px; }
        .left  { grid-column: 1; grid-row: 2; border-radius: 5px 0 0 5px; }
        .right { grid-column: 3; grid-row: 2; border-radius: 0 5px 5px 0; }
        .mid   { grid-column: 2; grid-row: 2; background: #222; border-radius: 0; cursor: default; }

        .action-btns {
            display: flex;
            gap: 15px;
            transform: rotate(-15deg);
        }
        .round-btn {
            width: 50px;
            height: 50px;
            background: #8e1e3b;
            border-radius: 50%;
            color: rgba(255,255,255,0.2);
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px #5e1327;
        }
        .round-btn:active { transform: translateY(2px); box-shadow: 0 2px #5e1327; }
        .label { font-size: 10px; margin-top: 5px; color: #444; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="gba-body">
    <div style="font-style: italic; color: #555; margin-bottom: 5px; font-weight: bold; font-size: 10px;">DOT MATRIX WITH STEREO SOUND</div>
    <div class="screen-bezel">
        <canvas id="gameCanvas" width="240" height="160"></canvas>
        <div id="dog-sprite"></div>
    </div>

    <div class="controls">
        <div class="d-pad">
            <button class="btn up" onmousedown="setKey('ArrowUp', true)" onmouseup="setKey('ArrowUp', false)" ontouchstart="setKey('ArrowUp', true)">▲</button>
            <button class="btn left" onmousedown="setKey('ArrowLeft', true)" onmouseup="setKey('ArrowLeft', false)" ontouchstart="setKey('ArrowLeft', true)">◀</button>
            <div class="mid"></div>
            <button class="btn right" onmousedown="setKey('ArrowRight', true)" onmouseup="setKey('ArrowRight', false)" ontouchstart="setKey('ArrowRight', true)">▶</button>
            <button class="btn down" onmousedown="setKey('ArrowDown', true)" onmouseup="setKey('ArrowDown', false)" ontouchstart="setKey('ArrowDown', true)">▼</button>
        </div>

        <div class="action-btns">
            <div>
                <button class="btn round-btn" onmousedown="setKey('KeyX', true)" onmouseup="setKey('KeyX', false)" ontouchstart="setKey('KeyX', true)">B</button>
                <div class="label">RUN</div>
            </div>
            <div>
                <button class="btn round-btn" onmousedown="setKey('KeyZ', true)" onmouseup="setKey('KeyZ', false)" ontouchstart="setKey('KeyZ', true)">A</button>
                <div class="label">JUMP</div>
            </div>
        </div>
    </div>
</div>

<script>
    const dogSprite = document.getElementById('dog-sprite');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // 精靈貼圖設定 (需要精確匹配你的圖片解析度)
    const frameWidth = 70; // ⚠️ 這需要是你圖片中單個白六方塊的像素寬度
    const frameHeight = 75; // ⚠️ 單個白六方塊的像素高度
    const cols = 3; // 網格列數
    const rows = 2; // 網格行數
    const totalFrames = cols * rows;

    // 遊戲狀態
    let keys = {};
    let isWalking = false;
    let currentFrame = 0;
    let animInterval;
    let currentX = 120; // 初始位置 (螢幕中央)

    function setKey(code, isPressed) {
        keys[code] = isPressed;
        checkWalkingStatus();
    }

    // 鍵盤監聽
    window.addEventListener('keydown', e => setKey(e.code, true));
    window.addEventListener('keyup', e => setKey(e.code, false));

    // 處理鬆開按鈕，防止觸控卡死
    window.addEventListener('mouseup', () => { keys = {}; checkWalkingStatus(); });
    window.addEventListener('touchend', () => { keys = {}; checkWalkingStatus(); });

    function checkWalkingStatus() {
        if (keys['ArrowRight'] || keys['ArrowLeft']) {
            if (!isWalking) startWalkingAnimation();
            isWalking = true;
        } else {
            if (isWalking) stopWalkingAnimation();
            isWalking = false;
        }
    }

    // --- 動畫核心邏輯 ---

    function startWalkingAnimation() {
        // 設定動畫循環速度 (例如每秒 8 幀)
        animInterval = setInterval(() => {
            currentFrame = (currentFrame + 1) % totalFrames;
            updateSpritePosition();
        }, 125);
    }

    function stopWalkingAnimation() {
        clearInterval(animInterval);
        currentFrame = 0; // 回到閒置幀 (左上角)
        updateSpritePosition();
    }

    // CSS Sprite 滾動核心
    function updateSpritePosition() {
        const col = currentFrame % cols;
        const row = Math.floor(currentFrame / cols);
        
        // **⚠️ 這裡的負值 `-col * frameWidth` 才是關鍵，表示圖片向左/上捲動**
        const xOffset = -col * frameWidth;
        const yOffset = -row * frameHeight;
        
        dogSprite.style.backgroundPosition = `${xOffset}px ${yOffset}px`;
    }

    // 遊戲循環 (處理移動)
    function gameLoop() {
        let speed = keys['KeyX'] ? 2.5 : 1.2; // B鍵加速

        if (keys['ArrowRight']) {
            currentX += speed;
            dogSprite.style.transform = 'scaleX(1)'; // 面向右
        } else if (keys['ArrowLeft']) {
            currentX -= speed;
            dogSprite.style.transform = 'scaleX(-1)'; // 水平鏡像面向左
        }

        // 邊界限制
        currentX = Math.max(10, Math.min(230, currentX));
        
        // 更新 CSS 實際位置
        dogSprite.style.left = `${currentX - (frameWidth/2)}px`;

        requestAnimationFrame(gameLoop);
    }

    // 初始化畫背景
    function initBackground() {
        ctx.fillStyle = '#d0f0c0'; // GB 螢幕綠
        ctx.fillRect(0, 0, 240, 160);
        
        ctx.strokeStyle = '#0f380f';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, 130);
        ctx.lineTo(240, 130); // 畫一條地平線
        ctx.stroke();
    }

    initBackground();
    gameLoop();
</script>
</body>
</html>

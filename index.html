<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥白六精靈圖編號修正工具</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            position: relative;
            /* 單幀 333x350，總共 999x700 */
            width: 999px; 
            height: 700px;
            background-image: url('image_8.png');
            background-repeat: no-repeat;
            background-size: 999px 700px;
            border: 3px solid #444;
        }
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
        }
        .cell {
            border: 2px solid #ff0000;
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.1);
        }
        .cell::before {
            content: attr(data-label);
            font-size: 100px;
            font-weight: 900;
            color: #fff;
            text-shadow: 5px 5px 0px #ff0000, -2px -2px 0px #000;
            z-index: 2;
        }
        .cell-desc {
            position: absolute;
            bottom: 15px;
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            padding: 4px 12px;
            font-weight: bold;
            border-radius: 20px;
            font-size: 18px;
        }
        .status-idle { background: #ffeb3b; border: 2px solid #f57f17; } /* 靜止亮黃色 */
        .status-start { background: #4caf50; color: white; border: 2px solid #1b5e20; } /* 起步綠色 */

        .info-panel {
            margin-top: 20px;
            background: #333;
            padding: 25px;
            border-radius: 12px;
            width: 800px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .sequence-list {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .seq-box {
            background: #444;
            padding: 10px 20px;
            border-radius: 5px;
            border-left: 5px solid #ff0000;
        }
    </style>
</head>
<body>

    <h1>白六精靈圖 (image_8.png) 動作編號驗證</h1>
    
    <div class="container">
        <div class="grid-overlay">
            <div class="cell" data-label="1"><div class="cell-desc status-start">起步圖</div></div>
            <div class="cell" data-label="2"><div class="cell-desc">行走 2</div></div>
            <div class="cell" data-label="3"><div class="cell-desc">行走 3</div></div>
            <div class="cell" data-label="4"><div class="cell-desc">行走 4</div></div>
            <div class="cell" data-label="5"><div class="cell-desc">行走 5</div></div>
            <div class="cell" data-label="6"><div class="cell-desc status-idle">靜止圖</div></div>
        </div>
    </div>

    <div class="info-panel">
        <h3>✅ 修正後的邏輯設定：</h3>
        <p>當你在開發主程式 HTML 時，請依照此標號進行 JavaScript 陣列設定：</p>
        <div class="sequence-list">
            <div class="seq-box"><strong>靜止 (Idle):</strong> 編號 6</div>
            <div class="seq-box"><strong>行走循環 (Walk):</strong> 1 → 2 → 3 → 4 → 5</div>
        </div>
        <p style="margin-top: 20px; color: #aaa; font-size: 14px;">
            ※ 每一格尺寸固定為：寬 333px / 高 350px。<br>
            ※ 若編號 6 確實位於下排右側，則背景位移座標應為 <code>x: -666px, y: -350px</code>。
        </p>
    </div>

</body>
</html>

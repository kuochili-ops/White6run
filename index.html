<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥白六世界時鐘 - 終極修正版</title>
    <style>
        :root {
            --gba-color: #8b8b8b;
            --screen-bg: #9bbc0f; 
            /* 單格原始解析度對齊 */
            --sprite-w: 333.33px; 
            --sprite-h: 350px; 
        }
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            touch-action: manipulation;
            overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }
        .gba-body {
            width: 320px;
            height: 560px;
            background: var(--gba-color);
            border-radius: 15px 15px 80px 15px;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 15px 15px 30px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .screen-bezel {
            width: 280px;
            height: 200px;
            background: #333;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #111;
            position: relative;
            overflow: hidden;
        }
        #game-screen {
            width: 240px;
            height: 160px;
            background: var(--screen-bg);
            position: relative;
            overflow: hidden;
        }
        #scrolling-bg {
            position: absolute;
            width: 500px;
            height: 100%;
            background-image: linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 40px 100%;
            left: -40px;
        }
        /* 核心修正：使用精確百分比避免像素誤差 */
        #dog-sprite {
            width: 333px; 
            height: 350px;
            background-image: url('image_8.png');
            background-repeat: no-repeat;
            /* 預設靜止：編號 6 (下右圖，索引 5) */
            background-position: -666.66px -350px;
            image-rendering: pixelated;
            position: absolute;
            left: 50%;
            margin-left: -166.5px;
            bottom: 20px;
            /* 縮放為 0.18 倍以完美適配畫面 */
            transform: scale(0.18);
            transform-origin: bottom center;
            transition: bottom 0.1s ease-out;
        }
        .controls { width: 100%; display: flex; justify-content: space-between; margin-top: 30px; padding: 0 10px; }
        .d-pad { display: grid; grid-template-columns: 45px 45px 45px; grid-template-rows: 45px 45px 45px; }
        .btn { background: #333; color: #555; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px #000; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; background: #222; }
        .up { grid-column: 2; grid-row: 1; border-radius: 5px 5px 0 0; }
        .left { grid-column: 1; grid-row: 2; border-radius: 5px 0 0 5px; }
        .right { grid-column: 3; grid-row: 2; border-radius: 0 5px 5px 0; }
        .down { grid-column: 2; grid-row: 3; border-radius: 0 0 5px 5px; }
        .action-btns { display: flex; gap: 15px; transform: rotate(-15deg); margin-top: 20px; }
        .round-btn { width: 55px; height: 55px; background: #8e1e3b; border-radius: 50%; box-shadow: 0 5px #5e1327; color: white; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="gba-body">
    <div class="screen-bezel">
        <div id="game-screen">
            <div id="scrolling-bg"></div>
            <div id="dog-sprite"></div>
        </div>
    </div>
    <div class="controls">
        <div class="d-pad">
            <button class="btn up">▲</button>
            <button class="btn left" ontouchstart="handleMove('ArrowLeft', true)" onmousedown="handleMove('ArrowLeft', true)">◀</button>
            <button class="btn right" ontouchstart="handleMove('ArrowRight', true)" onmousedown="handleMove('ArrowRight', true)">▶</button>
            <button class="btn down">▼</button>
        </div>
        <div class="action-btns">
            <button class="btn round-btn">B</button>
            <button class="btn round-btn" ontouchstart="jump()">A</button>
        </div>
    </div>
</div>

<script>
    const dog = document.getElementById('dog-sprite');
    const bg = document.getElementById('scrolling-bg');
    
    // 嚴格定義座標序列 (1-6)
    const walkFrames = [
        [0, 0], // 編號 1 (上左)
        [1, 0], // 編號 2 (上中)
        [2, 0], // 編號 3 (上右)
        [0, 1], // 編號 4 (下左)
        [1, 1]  // 編號 5 (下中)
    ];
    const idleFrame = [2, 1]; // 編號 6 (下右)

    let isMoving = false;
    let frameIdx = 0;
    let animTimer = null;
    let facing = 1;
    let bgPos = 0;

    function setSprite(coords) {
        // 使用 333.33 解決精靈圖邊緣溢出問題
        dog.style.backgroundPosition = `-${coords[0] * 333.33}px -${coords[1] * 350}px`;
    }

    function handleMove(dir, pressed) {
        if (pressed) {
            isMoving = true;
            facing = (dir === 'ArrowLeft') ? -1 : 1;
            dog.style.transform = `scale(0.18) scaleX(${facing})`;
            if (!animTimer) {
                animTimer = setInterval(() => {
                    frameIdx = (frameIdx + 1) % walkFrames.length;
                    setSprite(walkFrames[frameIdx]);
                }, 115);
            }
        } else {
            isMoving = false;
            clearInterval(animTimer);
            animTimer = null;
            frameIdx = 0;
            setSprite(idleFrame);
        }
    }

    function jump() {
        dog.style.bottom = "80px";
        setTimeout(() => { dog.style.bottom = "20px"; }, 250);
    }

    function loop() {
        if (isMoving) {
            bgPos -= facing * 2.5;
            bg.style.transform = `translateX(${bgPos % 40}px)`;
        }
        requestAnimationFrame(loop);
    }

    const stop = () => handleMove('', false);
    window.addEventListener('mouseup', stop);
    window.addEventListener('touchend', stop);
    
    loop();
</script>
</body>
</html>
